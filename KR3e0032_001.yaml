  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0032_WYG_001-1a, image: WYG0741/WYG0741-0376c.png}
body:
  text: 類證普濟本事方卷一宋許叔微撰治中風肝胆筋骨諸風治肝經因虚内受風邪卧則魂散而不守狀若驚悸真珠圎真珠母三分研細同碾當歸酸棗仁熟地黄各一兩半人參伏神柏子仁各一両犀角沉香龍齒各半錢右為細末煉蜜為丸如梧子大辰砂為衣每服四五十丸金銀薄荷湯下日午夜卧服獨活湯獨活黒者𦍑活人參防風前胡華隂細辛五味子沙參白茯苓半夏酸棗仁甘草各一兩右為粗末每服四大錢水一盞半生姜三片烏梅半箇同煎至七分去滓不拘時候紹興癸丑予待次四明有董生者患神氣不寜毎卧則魂飛揚覺身在牀而神魂離體驚悸多魘通夕無寐更數醫而不效予為診之親詢曰醫作何病治董曰衆皆以為心病予曰以脉言之肝經受邪非心病也肝經因虚邪氣襲之肝藏魂者也㳺魂為變平人肝不受邪卧則魂歸於肝神静而得寐今肝有邪魂不得歸是以卧則魂揚若離體也肝主怒故小怒則劇董欣然曰前此未之聞雖未服藥已覺沉疴去體矣願求藥法予曰公且持此説與衆醫言所治之方而徐質之閲旬日復至云醫徧議古今方書無與病相對者故予處此二方以贈服一月而病悉除此方大抵以真珠母為君龍齒佐之真珠母入肝經為第一龍齒與肝同類故也龍齒虎睛今人例以鎮心藥殊不知龍齒安魂虎睛定魄各有類也東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂㳺而不定虎能専静故魄止而有守予謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不識亦在夫人逹之而已治中風雖能言口不喎斜而手足嚲曵脉虚浮而數風中腑也盖風中脉則口眼喎斜風中腑則肢體廢風中臟則性命危凡風中腑宜汗而觧星附散天南星薄切汁浸白茯苓汁浸川烏汁浸人參不浸白附子汁浸白僵蚕汁浸没藥黒附子半夏薄切各等分以上右為細末毎服二錢水酒各一盞同煎至八分去滓熱服二三服汗出差頃在桐廬有人患此證三投此藥得汗手足能舉治體虚有風外受虚濕身如在空中二生散生附子生天南星各等分右二味㕮咀每服四大錢水一盞半生薑十片慢火煎至八分去滓服戊子年予在新安有此疾張醫博子發授此方三服愈治中風忽然昏若醉形體昏悶四肢不收風涎潮於上鬲氣閉不通宜急救稀涎散猪牙皂角四挺肥寔不蛀者去黒皮晋礬光明者一兩右細末研勻輕者半錢重者三匙匕温水調灌下不大嘔吐但㣲微冷涎出一二升便得醒次緩而調治不可便大服亦恐過傷人孫兆方治中風同前證勝金圓生薄荷半兩猪牙皂角二兩搥碎水一升二味一處搗引汁漫火熬成膏𤓰蒂末一兩黎蘆末一兩朱砂半兩研右将硃末一分與二味研勻用膏子搜和丸如龍眼大以餘硃為衣温酒化一丸甚者二丸以吐為度得吐即醒不醒者不可治必用方論中風無吐法引金虎碧霞為戒且如卒暴涎生聲如引鋸牙關𦂳急氣閉不行湯藥不能入命在湏㬰執以無吐法可乎但不當用銀粉藥恐損脾壊人四肢耳予常用此三方每毎有驗治一切風拒風丹川芎四兩防風一兩半天麻一兩甘草一兩細辛三錢半畢撥半両右細末煉蜜和杵每服作三十丸每将一粒細嚼荆芥湯或温酒下尋常些小傷風頭痛鼻塞項強筋急皆可服予家常合老幼所須之藥世言中氣者雖不見於方書然暴喜傷陽暴怒傷隂憂愁不豫氣多厥逆徃徃多得此疾便覺涎潮昏塞牙關𦂳急若概作中風候用藥非止不相當多致殺人元祐庚午母氏親遭此禍至今飲恨母氏平時食素氣血羸弱因先子捐舘憂惱忽一日氣厥牙噤涎潮有一里毉便作中風以大通丸三粒下之大下数行一夕而去予常痛恨每見此證急化蘓合香丸四五粒灌之便醒然後随其虚實寒熱而調治之無不愈者經云無故而瘖脉不至不治自已謂氣暴逆也氣服則已審如是雖不服藥亦可范子黙記崇寜中凡兩中風始則口眼喎斜次則涎潮閉塞左右共灸十二穴得氣通十二穴者謂聽㑹頬車地倉百㑹肩隅曲池風市足三里絶骨髪際大椎風池也依而用之無不立効元符中一宗人得疾踰年不差謁毉於王思和繹思和具脉状云病因驚恐肝臟為邪邪来乗陽明之經即胃是也邪盛不畏勝我者又来乗肺肺緣久病氣弱全無聽受其肝凌侮其病時復頭眩瘈瘲搐掣心胞伏涎久之則害脾氣要當平肝氣使歸經則脾不受尅脾為中州土主四肢一體之事脾氣正則土生金金旺則肺安矣今疾欲作時覺氣上衝者是肝侮肺肺不受侮故有此上衝肝勝則復受金尅故搐搦也以熱藥治之則風愈甚以冷藥治之則氣已虚肺屬金金為清化便覺臟腑不調今中和温藥抑肝補脾漸可安愈今心忪非心忪也胃之大絡名曰建里絡胸鬲及兩乳間虚而有痰則動須臾時發一陣熱者是其候也服下三方一月而愈思和名毉寓儀真時人少知者後至都下聲名籍甚為毉官政和中度為黄冠終藥珠侍晨續斷湯續㫁杜仲細辛白茯苓牛膝肉桂防風白芍藥各一兩甘草當歸人參川芎秦芁川獨活熟地黄各三兩右為細末每服二錢水一盞生薑三片棗一枚同煎至七分空心食前稍熱服薯蕷圎薯蕷人參沙参逺志防風真珠母紫石英研水飛茯神虎骨各一兩虎睛一對二味湏真者龍齒華隂細辛石菖蒲五味子丹参右為細末煉蜜為丸梧子大每服三十丸至五十丸金銀薄荷湯下食後臨卧服獨活散川獨活白术白茯苓葳蕤秦艽栢子仁甘草各一兩犀角川椒熟地黄枳寔白芷官桂各半兩人参一分右為細末每服二錢水一盞生薑三片棗一枚同煎至七分不拘時服治風在肝脾語蹇脚弱大便多秘地黄酒熟地黄四兩附子茵芋羌活防風芎藭各一兩石斛二兩丹參二兩半牛蒡根二兩半牛膝杜仲桂枝各兩半大麻子一升右細剉入絹袋盛寛貯之用無灰酒一斗九升封漬七日逐日空心食前飲一盞常􅀈勿令吐治中風内虚脚弱語蹇防風湯石斛一兩半乾地黄杜仲丹參各一兩一分防風川芎麥門冬桂心川獨活各一兩右為粗末每服五錢水一大盞半棗二枚同煎八分去滓温服治中風入脾肝經年四肢不遂舌強語蹇竹瀝湯葳靈仙附子桔梗防風蔓荆子枳殻川芎當歸各等分右為粗末每服四錢水一盞竹瀝半盞薑三片同煎至八分去滓温服日三四忌茗治久風邪入肝脾二經言語不轉防已湯漢防已防風桂心附子各半兩葳靈仙三分麻黄半両右為粗末每服四錢水一盞引子半盞煎至七分去滓温服日三四引子用竹瀝荆瀝地黄汁各一盞生薑汁半盞和勻用之以上四方龎先生𫝊審而用之良驗治筋急項强不可轉仄木𤓰煎宣州木𤓰二個取盖去穣沒藥二両研乳香一分研右二味入木𤓰内盖子合了竹簽定之飯上蒸三四次研爛成膏子每服三五匙地黄酒化下生地黄汁半盞無灰上醖二盞和之用八分一盞煖熱化膏有人患此病自午後發黄昏時定予曰此患必先從足起經言十二經絡各有筋惟足少陽之筋自足至頂大抵筋者肝之合也日中至黄昏天之陽陽中之隂也又曰陽中之隂肺也自離至兊隂旺陽弱之時故靈寳畢法云離至乾腎氣絶而肝氣弱肝腎二臟受隂氣故發於是時予授此方三服而愈同官歙丞張徳操常言其内子昔患筋攣脚不得屈伸者踰年動則令人持抱求毉於泗水楊吉老云此筋病宜服下三方服一年而愈治筋極飬血地黄圓熟地黄一錢頑荆一分山茱萸五分黒狗脊炙地膚子白术乾漆蠐螬乾炒天雄車前子各三錢蓽薢山羊澤㵼牛膝各一兩右細末煉蜜和杵如梧子大毎服五十丸温酒下空心夜卧服治筋痺肢節束痛羚羊角湯秋服之羚羊角桂皮附子獨活各一兩三錢半白芍藥防風炙芎藭各一兩右為粗末每服三大錢水一盞半生薑三片同煎至八分取清汁日服二三服治寒冷濕痺留於筋脉攣縮不得轉仄烏頭湯冬服之大烏頭細辛川椒甘草秦芁附子官桂白芍藥各七分乾薑白茯苓防風當歸各一両川獨活一両三錢半右為粗末每服三錢水一盞半棗二枚同煎至八分去滓空心食前服凡中風用續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以灸無不愈者然此疾積習之久非一日所能攻皆大劑久而取効唐書載王太后中風喑黙不語醫者蒸黄茋数斛以薰之得差盖此類也今人服三五盞求效責毉也速矣孟子曰七年之病三年之艾久而後知耳治一切癱瘓風鉄彈圎乳香沒藥各一兩川烏一兩半五靈脂四兩右先将乳香沒藥於隂凉處當風細研更用研了麝香一錢将下二味為細末然後同前二味再碾再研滴水為丸如彈子大磁合收每服一丸薄荷酒磨下日用三服黒神圓草烏頭不去皮生五靈脂各等分右為末六月六日滴水為丸如彈子大四十嵗以下分六服病甚一丸分二服薄荷酒磨下覺㣲麻為度治風客陽經邪傷腠理背脊強直口眼喎斜體熱惡寒痰厥頭痛肉膶筋惕辛額鼻淵及飲酒過多嘔吐涎沫頭目眩暈如在車船常服解五邪傷寒辟霧露瘴氣爽惠神志諸風不生定風餅子天麻川烏南星半夏川薑川芎甘草白茯苓等分並生右細末生薑汁為丸如龍眼大作餅子硃砂為衣毎服一餅細嚼熱生薑湯下不拘時候熙豐間王丞相常服預防風痰神驗治胆虚冷目眩頭疼心神恐畏不能獨處胸中滿悶茯神散茯神一両逺志防風細辛白术前胡人参桂心熟地黄甘菊花各三分枳殻治胆虚不得眠四肢無力鱉甲圎鼈甲人參黄茋酸棗仁牛膝羌活五味子各等分右為細末煉蜜杵丸如梧子大每服三四十丸酒下治胆虚目暗喉痛唾数眼目眩冒五色所障夢見被人訟恐懼面色變青補胆防風湯防風一錢人參六分細辛五分芎藭甘草茯神獨活前胡各八分右為粗末每服四大錢水一盞半棗二枚煎至八分去滓食前服治胆虚常多畏恐不能獨卧如人捕状頭目不利人參散人參枳殻五味子桂心各三分栢子仁熟地黄各一両山茱茰廿菊花茯神枸杞子各三分右為細末每服二錢温酒調服治肝厥状如癎疾不醒嘔吐醒後頭虗暈發熱方麻黄鈎籐取皮石膏乾葛半夏麯柴胡甘草枳殻甘菊各等分右為粗末每服四錢水一盞半生薑三片棗一枚同煎至八分去渣温服類證普濟本事方卷一
