  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0032_WYG_002-1a, image: WYG0741/WYG0741-0384a.png}
body:
  text: 類證普濟本事方卷二宋許叔微撰治心小腸脾胃病治因驚言語顛錯不能服溫藥宜逺志圎硃砂半兩入麝少許同研金箔五片逺志南星白附子白茯苓酸棗仁人參各半兩右為細末煉蜜丸如梧子大硃為衣每服三十丸薄荷湯下食後臨卧服茯神散茯神熟地黃白芍藥川芎當歸桔梗白茯苓逺志人參各等分右為細末每服二錢水一盞燈心棗同煎至七分不拘時服宋明逺教授母七十四嵗因戎馬驚疾如上證服此二方得力寧志膏人參一兩酸棗仁一兩辰砂半兩乳香一分右為細末煉蜜和杵丸如彈子大每服一丸薄荷湯化下豫族弟婦緣兵火失心製此方與之服二十丸愈親舊多𫝊去服之皆驗治驚憂積氣心受風邪發則牙關急緊涎潮昏塞醒則精神若癡驚氣圎附子南木香白僵蠶花蛇橘紅天麻麻黃各半兩乾蝎一分紫蘇子一兩天南星洗净切薄片姜汁浸一夕用半兩硃砂一分留少許為衣右為末入研腦麝少許同研極勻煉蜜杵丸如龍眼大每服一丸金銀薄荷湯化下溫酒亦可此豫家祕方也戊申年軍中一人犯法褫衣將受刃得釋神失如癡豫與一丸服訖而寐及覺病已去矣二東提轄張載揚其妻因避冦失心已數年豫授此方不終劑而愈又黃山沃巡檢彥其妻狂厥者踰年更十餘醫而不驗豫授此方去附子加鐵粉亦不終劑而愈鐵粉非但化涎鎮心至如摧抑肝邪特異若多恚怒肝邪太盛鐵粉能制伏之素問云陽厥狂怒治以鐵烙飲金尅本之意也此亦前人未嘗論及安神鎮心治驚悸消風痰止頭眩辰砂逺志圎石菖蒲逺志人參川芎山芋鐵粉天麻半夏麯南星銼骰子大麩炒黃白附子各一兩生細辛辰砂各半兩右為細末生姜五兩取汁入水煮和丸如菉豆大别以硃為衣乾之每服二十粒夜卧生薑湯下小兒減半服茯苓圎辰砂石菖蒲人參逺志茯神白茯苓真鐵粉半夏麯南星牛膽製各等分右為細末生姜四兩取汁和水煮糊丸如梧子大别用硃為衣乾之每服十粒加至二十粒夜卧生薑湯下上二方醫官都君豫常用以療心疾良驗治心驚熱小便澀及治五淋火府丹生地黃二兩木通黃芩各一兩右為細末煉蜜杵丸梧子大每服三十丸木通煎湯下此藥治淋澀臍下滿痛壬戌年一卒病渴日飲斗水不食者三月心中煩悶時已十月豫謂必心經有伏熱與此藥數服五十粒溫水下越二日不覺來謝云當日一服渴止又次日三服飲食如故此本治淋用以治渴信知用藥要在變通也開胃飬氣進飲食七珍散人參白术黃茋蜜水拌炙甘草粟米微炒白茯苓各一兩右為細末每服二錢水一盞薑薑同煎至七分如故不思飲食加白扁豆一兩蒸用名八珍散豫製此方溫平不熱每有傷寒瘧疾中暑得差之後用此以調脾胃日三四服十日外飲食倍常治脾氣久虛不進飲食停飲脅痛麯术圓神麯十兩微炒白术五兩土炒乾薑官桂川椒吳茱萸各二兩右為細末薄糊丸如梧子大每服三五十丸生薑湯下食前稍空服有飲加半夏麯二兩癸亥中豫作數劑自服飲食倍進和氣調中進飲食白术湯白术厚朴桂心桔梗乾薑人參當歸茯苓甘草各等分右為粗末每服四錢水盞半棗二枚煎八分去滓不拘時服龎老方治腰腎虛弱全不飲食二神圓破故紙四兩炒肉豆蔲二兩生右為細末用大肥棗四十九枚生姜四兩切片同煮棗爛去姜取棗剝去皮核用肉研為膏入藥和杵丸如梧子大每服三十丸鹽湯下有人全不進食服補脾藥皆不效豫授此方服之頓然能食此病不可全作脾虛蓋腎氣怯弱真元衰劣自是不能消化飲食譬如鼎釜之中置諸米榖下無火力雖終日米不熟其何能化黃魯直嘗記服兔絲子净淘酒浸曝乾日炒數匙以酒下十日外飲噉如湯沃雪亦此理也溫脾散舶上茴香炒青皮陳艾縮砂仁桔梗香白芷厚朴各一兩木香白术香附子各半兩甘草一兩半紅豆良姜麥芽乾葛各三分右為粗末每服一錢水一盞棗一枚煎七分食前服治肺腎兩經病肺之積名曰息賁在右脅下大如杯令人灑淅寒熱喘嗽發癰疽棗膏圓葶藶陳橘皮桔梗各等分右先以下二味為末入葶藶研勻煮肥棗肉和丸如梧子大每服五七丸飲下豫常患停飲久積肺經食已必嚏漸喘覺肺系急服此良驗平肺氣補虛消飲五味子圓五味子二兩桂心大杏仁青皮細辛人參檳榔煨各一兩乾姜炮附子各半兩右為細末煉蜜為丸如梧子大每服三四十丸或酒或湯下空心食前日三服定喘急肺積葶藶圓苦葶藶一兩一錢當歸肉桂白蒺藜乾姜川烏頭吳茱茰鱉甲大杏仁白茯苓人參各半兩檳榔一兩右為細末煮棗肉和杵丸如梧子大每服二三十丸姜棗湯下日三四服不拘時治多年肺氣喘急紫金丹信砒飛半錢豆豉略潤少成膏右用膏子和砒同杵極勻丸如麻子大每服十五丸小兒量大小與之並用䗶茶臨卧以知為度有一親戚婦人患十年而醫者皆不效忽有一道人貨此藥漫贖一服是減半數服頓愈遂多金丐得此方豫屢用以救人特為神異治肺虛實不調鼻塞多涕咽中有涎而喘項強筋急或痛細辛湯細辛半夏麯茯苓桔梗各四錢桂枝三錢甘草二錢右為粗末每服四錢水二盞生姜四片蜜半匙同煎至七分溫服日三服治肺癰吐膿血作臭氣胸乳皆痛升麻湯川升麻桔梗薏苡仁地榆子芩牡丹皮芍藥各半兩甘草三分右銼粗末每服一兩水一升半煎五合去滓日三服治肺喘久不息賁五靈圓五靈脂二兩半木香半兩葶藶一分馬兜鈴一分去殼炒右為細末棗肉和丸如梧子大每服二十丸姜湯下日三服脾惡濕腎惡燥如硫黃附子鐘乳鉛丹之類皆剛劑人用之以助陽補接真氣則可若云補腎則正腎所惡者古人製方益腎皆滋潤之藥故仲景八味丸本謂之腎氣丸以地黃為主又補腎強陽之類皆正補腎經也近世盛行香茸丸可補腎經亦有數方具後蔡太師所服香茸丸鹿茸熟地黃各二兩附子蓯蓉破故紙當歸各一兩沉香半兩射香一錢右為末入麝研勻煉蜜杵丸梧子大每服三五十丸空心鹽湯下又方鹿茸二兩沉香人參白芍藥熟地黃生地黃蓯蓉牛膝澤㵼大附子當歸各一兩麝香一錢右為細末酒糊丸如梧子大每服五十丸鹽酒鹽湯下又方熟地黃五兩兔絲子四兩别末鹿茸三兩附子二兩沉香一兩右為細末入麝半錢煉蜜杵丸如梧子大每服三十丸至五十丸鹽酒鹽湯下治腎氣上攻項背不能轉移椒附散大附子一枚六錢以上者炮去皮臍末之右每末二大錢好川椒二十粒用白麵填滿水一盞半生姜七片同煎至七分去椒入鹽通口空心服一親患項筋痛連及背髆不可轉服諸風藥皆不效豫嘗憶千金羸有腎氣攻背豫強證與之兩服頓差自後與人皆有驗蓋腎氣腰自夾脊上至曹溪穴然後入泥丸宫曹溪一穴非精於搬運者不能透今逆行至此不得通用椒以引歸經則安矣蕭氣上逹椒下逹詩言椒聊且貽我握椒皆此意矣治腎經虗腰不能轉仄麋茸圎麋茸一兩如無以鹿茸代之兔絲子取末一兩舶上茴香半兩右為末以羊腎一對法酒煮爛去膜研如泥和丸如梧子大隂乾如腎膏少入酒糊佐之每服三五十丸溫酒鹽湯下戊戌年八月淮南大水城下浸灌者連月豫忽臟腑不調腹中如水吼數日調治得愈自此腰痛不可屈折雖頮面亦相妨服遍藥不效如是凡三月豫後思之此必水氣隂腎腎經感此而得乃灸腎愈三七壯服此藥差治腎虗或時腳腫兼治脾圎地黃圎熟地黃二兩半肉蓯蓉白茯苓澤㵼各三兩桂枝附子各半兩五味子黃茋一兩獨莖者右為細末煉蜜杵丸如梧子大每服四五十丸空心酒下食前再服治腎虗足膝無力青鹽圎茴香三兩兔絲子末四兩乾山藥二兩青鹽一兩右將兔絲洗淘無灰酒浸日中煎七日冬天近火煨之晒乾别末將餘藥末和勻酒糊丸如梧子大每服三五十丸鹽酒鹽湯下豫頃常服數年力壯食加有一婦人足嚲曵因服此藥履地如故補益虛勞方治肝腎俱虗收斂精氣補真戢陽充悅肌膚進美飲食五味子圓五味子川巴㦸肉蓯蓉人參熟地黃覆盆子白术兔絲子益智仁炒骨碎補洗去毛牡礪以上各等分右為細末煉蜜杵丸如梧子大焙乾每服三十丸空心食前米飲下日二三服此藥補氣止汗平補五腑虛羸六府怯弱充肌膚進飲食人參圎人參山芋白术白茯苓石斛黃茋取頭末五味子各一兩右為細末煉蜜丸如梧子大每服三十丸空心食前飲下久服不熱尤宜少年補血益氣治虛勞少力雙和散黃茋熟地黃當歸川芎各一兩白芍藥二兩官桂甘草各三分右為粗末每服四大錢水一盞半生薑三片肥棗一枚煎至八分去滓服豫製此方止是建中四物二方而已每傷寒瘧疾中暑大病之後虛勞氣乏者以此調治皆驗不熱不冷溫而有補黑錫圎此丹陽慈濟貞方黑鉛硫黃各三兩舶上茴香附子胡盧巴破故紙川練肉肉豆蔲各一兩巴㦸木香沉香各半兩右將沙子研細餘藥末研勻入碾自朝至暮以黑光色為度酒糊丸如梧子大隂乾布袋內探令光瑩如丈夫元臟虛冷真陽不固三焦不和上熱下冷夜夢鬼交覺來盜汗面無精光肌體燥澀耳內虛鳴腰疼痛心氣虛精神不寧飲食無味日漸瘦悴膀胱久冷夜多小便婦人月事愆期血海久泠惡路不止赤白帶下及隂毒傷寒面青舌卷隂縮難言四肢厥冷不省人事急用棗湯吞下一二百丸即便回陽命無不活但是一切冷疾鹽酒鹽湯空心吞下三四十丸婦人艾醋湯下此樂大能調治榮衛升降隂陽安和五臟灑陳六腑補損益虛回陽返隂功驗神聖治虛勞羸瘦乏力不食倦怠多驚畏石斛散石斛四錢牛膝柏子仁五味子逺志木香杏仁肉蓯蓉陳橘皮訶子人參熟地黃各三錢白茯苓柴胡炒甘草二錢神曲麥芽各六錢乾姜一錢半右為細末每服二錢米飲調下食前日三服治虛損補精髓壯筋骨益心智安魂魄令人悅懌駐顔輕身延年益夀閉固天癸八仙丹伏火硃砂真磁石赤石脂代赭石石中黃禹餘糧五味並用醋淬乳香沒藥各一兩右為細末研勻極細糯米濃飲丸如梧子大或如豆大每服一粒空心鹽湯下有人年幾七旬夢漏羸弱氣惙惙然虛損得此方服之忽然強壯精氣固閉飲食如故豫常製此自服良驗治頭痛頭暈方治風眩頭暈川芎散山茱茰一兩山藥甘菊花人參茯神小川芎各半兩右細末每服二錢酒調下不拘時候日三服不可誤用野菊龎先生方治肝厥頭暈清頭目鈎藤散鈎藤陳皮半夏麥門冬茯苓茯神人參甘菊花防風各半兩甘草一分石膏一兩右為粗末每服四錢水一盞半生薑七片煎八分去滓溫服治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脉舉之則弦按之石堅宜玉真圓玉真圓硫黃二兩石膏煆通赤研半夏湯柴洗各一兩硝石一分半右為細末研勻生薑汁糊丸如梧子大隂乾每服二十丸薑湯或米飲下更灸關元穴百壯良方中黃丸子亦佳素問云頭痛顛疾下虛攻實過在足少隂巨陽甚則入腎狥䝉招搖目瞑耳聾下實上虛過在足少陽厥隂甚則在肝下虛者腎虗也故腎厥則頭痛上虛者肝虛也故肝虛則頭暈狥䝉者如以物䝉其首招搖不定目眩耳聾皆暈之狀也故肝虛頭暈腎厥顛痛不同如此治肝厥鈎藤散在前治氣虗頭疼大附子一枚剜去心全蝎二個入在內以所剜附子末同鍾乳粉一分麵少許水和裹炮熟都碾為末以焦黃為度葱茶調下一錢或半錢甚效又方大川芎二個銼作四片大附子一個和皮生為末右以水和附子末如麵劑裹芎作四處如附子末少入少麵裹畢以針穿數孔用真腦麝薰有穴處內香再捻合穴子如末覺內有香即再薰一炷細羅灰用銚子內熱灰炮熟末之每服半錢葱茶調下不拘時候右泗醫楊吉老二方神良又方好川芎半兩為末每服二錢臘茶清調下甚捷曾有婦人産後頭痛一服愈治氣虛頭暈白芷圓白芷石斛乾薑各兩半細辛五味子厚朴肉桂防風茯苓甘草陳皮各一兩白术一兩一分右為細末煉蜜丸如梧子大每服三十丸清米飲下不饑不飽服鄉人邵致逺年八十有三有此疾得此方數服即愈楊吉老𫝊治風寒客於頭中偏痛無時疼時牽引兩目遂致失明白附子散白附子一兩麻黃不去節川芎南星各半兩全蝎五個硃砂麝香各一分右為細末酒調一匙服之去枕少時此方見必用方庚寅年一族人患頭痛不可忍一服即差治一切頭旋本因體氣弱風邪乘於陽經上注於頭面遂入於腦亦因痰水在於胸膈之上犯大寒使陽氣不行痰水結聚上衝於頭目令頭旋羚羊角散羚羊角茯神各一兩芎藭防風半夏湯柴洗白芷甘草各半兩枳殼附子各一分右為粗末每服四錢水一盞半生薑半分漫火煎至七分去滓不拘時溫服治虛風頭旋吐涎不已養正丹黑鉛水銀硫黃硃砂各一兩右用建盞一隻火上鎔化成汁次下水銀用栁枝條打勻取下放少時下二味末打勻令冷取下研為粉用米飲丸或用棗肉丸如梧子大每服三十丸鹽湯下此藥升降隂陽補接真氣非止頭旋而已治一切中風頭疼黑龍圓天南星洗川烏各半斤黑豆蒸三次石膏半斤麻黃乾薄荷四兩藁本白芷各二兩京墨一兩半右為細末煉蜜杵丸彈子大每服一丸薄荷茶湯嚼下類證普濟本事方卷二
