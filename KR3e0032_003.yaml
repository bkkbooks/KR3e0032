body:
  text: 類證普濟本事方卷三宋許叔微撰風寒濕痺白虎癧節走注諸病治風濕四肢浮腫肌肉麻痺甚則手足無力筋脉緩急續斷圓川續斷萆􅐺當歸切微炒附子防風天麻各一兩乳香半兩沒藥半兩川芎三分右細末煉蜜丸如梧子大每服三四十丸或酒或飲下空心食前服治榮衛澀少寒濕從之痺滯關節不利而痛者增損續斷圓川續斷薏苡仁牡丹皮桂心山芋白茯苓黃茋山茱萸石斛麥門冬各一兩乾地黃三兩人參防風炙白术炮鹿角膠各七錢右為細末煉蜜丸梧子大每服三四十丸溫酒下空心食前服治風寒濕痺麻木不仁粥法川烏生為末右用香熟白米作粥半碗藥末四錢同米用漫火熬熟稀薄不要稠下姜汁一茶匙許蜜三大匙攪勻空心啜之溫為佳如是中濕更入薏苡仁末二錢增米作一中碗服此粥大治手足四肢不遂痛重不能舉者有此證預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝尅故疾在末穀氣引風濕之藥徑入脾經故四肢得安此湯劑極有力豫常製此方以授人服者良驗治濕傷腎腎不飬肝肝自生風遂成風濕流注四肢筋骨或入左肩髆肌肉疼痛入左指中薏苡仁散薏苡仁一兩當歸小川芎乾姜甘草官桂防風茵芋人參羌活白术麻黃獨活各半兩右為細末每服二錢空心臨卧酒調下日三服治五種痺腿步臂間發作不定此脾胃虛衛氣不溫分肉為風寒濕所著芎附散小川芎附子黃茋白术防風熟地黃當歸桂心柴胡甘草各等分右為粗末每服四錢水一盞半生薑三片棗一枚同煎七分去滓食前日三服常服不生壅熱兼消積冷治白虎癧節諸風疼痛遊走無定狀如蟲嚙書靜夜劇及一切手足不測疼痛麝香圓川烏大八角者三個生用全蝎二十一個生黑豆三十一粒生用地龍半兩生右為細末入麝半分同研勻糯米糊為丸如菉豆大每服七丸甚者十丸夜卧令鬲空溫酒下微出冷汗一身便差豫得此方凡是癧節及不測疼痛一二服便差在歙州日有一貴家婦人遍身走注疼痛至夜則發如蟲嚙其肌多作鬼邪治子曰此正癰節病也三服愈癧節宜發汗麻黃散麻黃一兩一分羌活一兩黃芩三分細辛真華隂者黃茋右為粗末每服五錢水二盞煎至八分去滓溫服接續三四服有汗慎風治癧節腫滿疼痛茵芋圓茵芋硃砂薏苡仁各一分牽牛子一兩半郁李仁半兩右為細末煉蜜杵丸如梧子大輕粉滚為衣每服十至十五至三十丸五更初溫水下到晚未利可二三服快利為度白粥將息治風熱或癧節攻手指作赤腫麻木甚則攻肩背兩膝遇暑熱或大便閉即作牛蒡子散牛蒡子三兩新豆豉炒羌活各一兩生地黃二兩半黃茋一兩半右為細末湯調二錢空心食前日三服此病多胸鬲生痰久則赤腫附著肢節久久不退遂成厲風此孫真人所預戒也宜早治之治厲風手指攣曲節間疼不可忍漸至斷落萆麻圓萆麻去殼黃連銼如豆各二兩右以小瓶子入水一升同浸春夏三日秋冬五日後用萆麻子一粒擘破面東以浸藥水吞下平旦服漸加至四五粒微利不妨水少更添忌動風物纍用得效神良柏葉丸柏葉麻黃山梔子枳殼羌活羊肝石白蒺藜升麻子芩防風牛蒡子荆芥茺蔚子大黃各半兩苦參一兩烏蛇一條右為細末每服二錢溫水調下日七八服龎老方治風毒瘡如大風疾緑靈散用桑葉洗熟蒸日乾為末水調二錢日服四五丸治走疰癧節諸風軟痛卒中倒地跌撲傷損趂痛圎草烏頭三兩半去皮尖熟地黃南星半夏麯白僵蠶烏藥各半兩並日乾右為細末酒糊丸如梧子大日乾每服五七粒空心夜卧溫酒下如跌撲痛用姜汁和酒研十數粒搽之如卒中倒地姜汁茶清研五六丸灌下立醒大智禪師方治宿患風癬遍身黑色肌體如木皮膚粗澀及四肢麻痺烏頭圓草烏頭一斤入竹籮子內以水浸用瓦子於籮內就水中瀧洗如打菱角法直候瀧洗去大皮及尖腔起令乾用麻油四兩鹽四兩入銚內炒令深黃色傾出油只留鹽並烏頭再炒令黑色烟出為度取一枚劈破心內如米一㸃白恰好也如白多再炒趂熱杵羅為末用醋糊丸如梧子大乾之每服三十丸空心晚食前溫酒下真州資福文雅白老元祐間有此疾服此數年肌體黑㸃頓除腳力强健視聼不衰有一宗人遍身紫㸃風身如墨服踰年體悅澤教豫服之亦得一年許諸風瘡疹瘍皆除然性差熱雖制去毒要之五七日作烏頭粥啜之為佳法用預章集中者治風痰停飲痰癖嗽治停痰宿飲化痰圓半夏湯洗三次别末人參白茯苓白术桔梗切作小片薑汁浸各一兩枳實香附子前胡甘草各半兩右為細末用半夏薑汁煮糊丸如梧子薑湯下三四十丸治中腕風痰涎飲眩瞑嘔吐酸水頭疼惡心三生圓半夏二兩南星白附子各一兩右並生為末滴水丸如梧子大以生麵滚衣隂乾每服十丸至二十丸薑湯下治心腹中腕痰水冷氣心下汪洋嘈雜腸鳴多睡口中清水自出脅肋急脹痛不欲食此胃氣虛冷所致其脉沉弦細遲旋覆花湯旋覆花細辛橘皮桂心人參甘草桔梗白芍藥半夏各半兩茯苓三分右為粗末每服四錢水盞半薑七片煎八分去滓溫服治心下停飲冷痰頭目瞑眩睡卧口多涎檳榔丸檳榔三分丁香半夏一兩細辛乾薑人參各半兩右為細末薑汁煮糊丸如梧子薑湯下二三十丸日三服治酒癖停飲吐酸水乾薑丸聖惠方乾薑葛根枳殼橘紅前胡各半兩白术半夏麯山茰肉甘草各一分右為細末煉蜜丸如梧子每服三十丸用飲下治積聚停飲痰水生蟲久則成反胃及變為胃癰其說在靈樞及巢氏病源芫花圎芫花醋製乾稱一兩乾漆狼牙根桔梗炒黃藜盧炒檳榔各半兩巴豆十粒去殼炒微黑右為細末醋糊丸如赤豆大每服二三丸加至五六丸食前姜湯下此方常服化痰消堅殺蟲豫患飲癖三十年暮年多嘈雜痰飲來潮即吐有時急飲半杯即止蓋合此證也因讀巢氏病源論酒瘕云飲酒多而食榖少積久漸瘦其病常思酒不得酒即吐多睡不復能食是鬲中有蟲使然名為酒瘕此藥治之要之須禁酒即易治不禁無益也豫生平有二疾一則臟腑下血二則鬲中停飲下血有時而止停飲則無時始因年少時夜坐為文左向伏几案是以飲食多墜向左邉中夜以後稍困乏必飲兩三杯既卧就枕又向左邉側睡氣壯盛時殊不覺三五年後覺酒從左邉下漉漉有聲脅痛飲食殊減十數日必嘔吐數升酸水暑月止是右邉身有汗褻褻常潤左邉病處燥無汗遍訪名醫及海上方服之少有驗間或中病止得月餘復作其補則如天雄附子礬石其利則如牽牛甘遂大㦸偹嘗之矣豫復揣度之已成癖囊如潦水之有科臼不盈科不行水盈科而行也清者可行濁者依前停留蓋下無路以决之也是以積之六七日必吐而去稍寬數日復作也脾土惡濕而水則流濕莫若燥脾以勝濕崇土以填科則此疾自去矣於是悉屏諸藥一味服蒼术三月而疾除自此一向服數年不吐不嘔胸鬲寬飲啖如故暑月汗周身而體凉飲亦當中下前此飲漬其肝目亦多昏眩其後燈下能書細字皆蒼术之力也其法蒼术一斤去皮切末之用生麻油半兩水二盞研濾取汁大棗十五枚爛煮去皮核研以麻汁勻研成稀膏搜和入臼熟杵丸如梧子大乾之每日空腹用溫湯吞下五十丸加至一百丸二百丸忌桃李鵲鴿初服時必鬲微燥且以茅术製之覺燥其進山梔散一服久之不燥矣豫服半年以後止用燥烈味極辛者削去皮不浸極有力亦自然不燥也山梔散用山梔子一味乾之為末沸湯㸃服故知久坐不可伏向一邉時或運動亦消息之法治肺氣風寒作嗽紫蘇散紫蘇桑白皮青皮五味子杏仁麻黃甘草各等分右為粗末每服二錢水一盞煎至七分溫服利鬲去涎思食止嗽訶子湯訶子煨去核青皮麥冬各半兩檳榔四個半夏三分甘草一分右為粗末每服四錢水二盞薑七片煎七分溫日三服治諸嗽久不差貝母湯貝母一兩去心薑製半日焙黃芩生用乾薑生各一兩陳皮五味子各一兩桑白皮半夏柴胡桂心各半兩木香甘草各一分右為粗末每服五錢水一盞半杏仁七粒去皮尖碎之生姜七片同煎至七分去滓熱服黃師文云戊申冬有蔣姓者其妻積年嗽製此方授之一服差以此治諸嗽即皆愈積聚凝滯五噎鬲氣大抵治積或以所惡者攻之以所喜者誘之則易愈如碙砂水銀治肉積神麯麥芽治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用羣隊之藥分其勢則難取效嗣宗所謂譬猶獵不知兔廣絡原野冀一人獲之術亦踈矣須是認得分明是何積聚然後增減用藥不爾又有所損嗣宗自謂不著書在臨時變通也治五種積氣及五噎胸鬲不快停痰宿飲纒金丹丁香木香沉香檳榔官桂胡椒碙砂研白丁香各一分肉豆蔲飛礬各一分馬兜鈴炒南星五靈脂瓜簍根半夏各半兩硃砂三分留半為衣右為細末入二味研藥和勻生姜汁煮糊丸如梧子大每服三丸生姜湯下或乾嚼蘿蔔下治心下蓄積痞悶或作痛多噫敗卵氣枳殼散枳殼白术各半兩香附子一兩檳榔三錢右為細末每服二錢米飲調下日三服不拘時候龎老方治伏積注氣發則喘悶訶子圓訶子白茯苓桃仁枳殼桂心檳榔鱉甲桔梗白芍藥川芎川烏人參橘紅各等分右細末煉蜜杵丸如梧子大酒下二十丸熟水亦得治一切積聚有飲心痛碙砂圓碙砂荆三稜别末乾薑香白芷巴豆去油各半兩大黃别末乾漆各一兩木香青皮胡椒各一分檳榔肉豆蔲各一個右為細末釅醋二升煎巴豆五七沸後下三稜大黃末同煎五十沸入碙砂同煎成稀膏稠希得所便入諸藥和勻杵丸如菉豆年深氣塊薑湯下四五丸食積熟水下白痢乾薑湯下赤痢甘草湯血痢當歸湯葱酒亦得治男子婦人患食勞氣勞遍身黃腫欲變成水及久患痃癖小腸膀胱靣目悉黃紫金丹膽礬三兩黃䗶一兩青州棗五十個右於磁合內用頭醋五升先下礬棗漫火熬半日以來取出棗去皮核次下䗶一處更煮半日如膏入好䗶茶末二兩同和丸如梧子大每服三十丸茶酒任下如久患漏風痔漏陳茶飲下宋室趙彥才下血靣如臘不進食蓋酒疾也授此方服終劑而血止靣色鮮潤食亦倍常新安有一兵士亦如是與三百丸作十服亦愈治沉積感應圓丁香木香各半兩乾薑一兩百草霜二兩研肉豆蔲二十個巴豆七十粒取霜杏仁一百四十粒煮酒臘四兩麻油一兩秋冬增半兩臘減半兩右以二香薑蔲為細末并三味研極勻煉油蠟和成劑油紙裹旋圓如菉豆大熟水下五十丸此藥近年盛行於世有數方惟此真高豫家得之於王景長用之的有效治五種積氣三焦痞塞胸鬲滿悶背膐引疼心腹膨脹脅刺痛飲食不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寬中消痃癖積聚散驚憂恚氣宜服枳殼散枳殼荆三稜橘皮益智仁蓬莪术檳榔肉桂各一兩乾薑厚朴甘草青皮肉豆蔲木香各半兩右為細末每服二錢水一盞生薑三片棗一枚同煎至七分熱服鹽㸃亦得不拘時服治氣食憂勞思慮五噎鬲氣圓半夏桔梗各二兩肉桂枳殼各一兩半右細末薑汁和丸如梧子薑湯下三十丸食後臨卧服治胸鬲悶塞作噎薰鬲圓麥門冬甘草各半兩人參桂心細辛川椒逺志去心炒附子乾薑各一錢右細末蜜丸如雞豆大綿裹一丸含化食後日夜三服膀胱疝氣小腸精漏治膀胱疝氣外腎腫脹痛不可忍念珠圓乳香碙砂各三錢飛黃䗶一兩右乳香研細與碙砂同研勻鎔臘和丸作一百單八粒以綿穿之露一夕蛤粉為衣旋取一丸用乳香湯吞下頃年有人貨疝氣藥肩上擔人我二字以為招目貨日數千有一國醫多金得之用之良驗碙砂圓木香沉香巴豆肉金者各兩青皮二兩不去皮銅青半兩研碙砂一分研右上二香青皮三味細銼同巴豆漫火炒令紫色為度去巴為末入青砂二味研勻蒸餅和丸如梧子大每服七丸至十丸鹽湯吞下二三服空心食前服治膀胱腫硬牽引疼痛及治小腸氣隂囊腫毛間水出金鈴圓金鈴子肉五兩小茴香炒馬蘭花炒兔絲子海蛤破故紙海𢃄各三兩木香丁香各一兩右細末糊丸如梧子大每服二三十丸溫酒鹽湯下空心食前服治小便難小腸脹不急治殺人右用葱白三斤細銼炒令熱以帕子裹分作兩處更替尉臍下即通治膀胱氣痛茴香散茴香金鈴子肉蓬莪术荆三稜各一兩甘草半兩炙右細末每服二錢熱酒調下強幼安云每發痛甚連日只二三服立定頃在徽城日歙尉宋荀甫膀胱氣作疼不可忍醫者以剛劑與之愈疼甚小便不通三日矣臍下虛脹心悶豫因候之見其靣赤黑脉洪大豫曰投熱藥太過隂陽痞塞氣不得通為之奈何宋尉尚持四神丹數粒云醫者謂痛不止更服此豫曰若服此定斃後無悔渠懇求治豫適有五苓散一兩許分三服易其名用連鬚葱一莖茴香一撮鹽一錢水一盞半煎八分令接續三服中夜下小便如黑汁者一二升臍下寬得睡翌日診之脉已平矣續用碙砂丸與之數日差大抵此疾因虛得之不可以虛而驟補藥經云邪之所凑其氣必虛留而不去其病則實故必先滌所蓄之邪然後補之是以諸方多借巴豆氣者蓋謂此也治遺精夢漏關鎖不固金鎖丹亦名茴香圓舶上茴香胡蘆巴破故紙白龍骨各一兩木香一兩半胡桃肉三七個研羊石子三對切開鹽半兩擦炙熟研如膏右五味為末下二味同研成膏和酒浸蒸餅杵熟丸如梧子大每服三五十丸空心溫湯下治經絡熱夢漏心忪恍惚鬲熱清心圓右好黃蘖皮為細末用生腦子一錢同研勻煉蜜丸梧子大每服十丸至十五丸濃煎麥冬湯下大智禪師方夢遺不可全作虛冷亦有經絡熱而得之也猪苓圓右用半夏一兩破如豆大用木猪苓四兩先將一半炒半夏黃色不令焦地上出火毒半日取半夏為末糊丸如梧子大候乾更用前猪苓末二兩炒微裂同用不泄沙瓶養之空心溫酒鹽湯下三四十丸常服於申未間冷酒下此藥治夢遺有數種下部虛憊精不禁者宜服茴香丸年壯氣盛久節淫欲經絡壅滯者宜服清心丸有情欲動中經所謂所願不得名曰白淫餌良方茯苓散正似瓶中煎湯氣盛而溢者如瓶中沸湯而溢欲動心邪者如瓶之傾側而出虛憊不禁者如瓶中有鏬而漏不可一槩用藥也又有一說經曰腎氣閉即精泄素問云腎者作強之官伎巧出焉又曰腎氣藏精蓋腎能攝精氣以生育人倫者也或斂或散皆主於腎今也腎氣閉則一身之精氣無所管攝故妄行而出不時也猪苓圓一方正為此設此古方也今盛行於時而人多莫測其用藥之意蓋半夏有利性而猪苓導水蓋導腎氣使通之意也豫藥囊中嘗貯此藥緩急以與人三五服皆隨手而驗林監丞庇民亦數服而愈類證普濟本事方卷三
