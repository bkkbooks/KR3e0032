body:
  text: 類證普濟本事方卷三宋許叔㣲撰風寒濕痺白虎癧節走注諸病治風濕四肢浮腫肌肉麻痺甚則手足無力筋脉緩急續斷圓川續㫁萆􅐺當歸切㣲炒附子防風天麻各一両乳香半両沒藥半両川芎三分右細末煉蜜丸如梧子大毎服三四十丸或酒或飲下空心食前服治榮衛澁少寒濕從之痺滯關節不利而痛者増損續斷圓川續㫁薏苡仁牡丹皮桂心山芋白茯苓黄茋山茱萸石斛麥門冬各一両乾地黄三両人参防風炙白术炮鹿角膠各七錢右為細末煉蜜丸梧子大毎服三四十丸温酒下空心食前服治風寒濕痺麻木不仁粥法川烏生為末右用香熟白米作粥半碗藥末四錢同米用漫火熬熟稀薄不要稠下姜汁一茶匙許蜜三大匙攪勻空心啜之温為佳如是中濕更入薏苡仁末二錢增米作一中碗服此粥大治手足四肢不遂痛重不能舉者有此證預服防之左氏云風淫末疾謂四肢為四末也脾主四肢風邪客於肝則淫脾脾為肝尅故疾在末糓氣引風濕之藥徑入脾經故四肢得安此湯劑極有力予常製此方以授人服者良騐治濕傷腎腎不飬肝肝自生風遂成風濕流注四肢筋骨或入左肩髆肌肉疼痛入左指中薏苡仁散薏苡仁一両當歸小川芎乾姜甘草官桂防風茵芋人参羌活白术麻黄獨活各半両右為細末毎服二錢空心臨卧酒調下日三服治五種痺腿歩臂間發作不定此脾胃虚衛氣不温分肉為風寒濕所著芎附散小川芎附子黄茋白术防風熟地黄當歸桂心柴胡甘草各等分右為粗末每服四錢水一盞半生薑三片棗一枚同煎七分去滓食前日三服常服不生壅熱兼消積冷治白虎癧節諸風疼痛㳺走無定状如蟲嚙書静夜劇及一切手足不測疼痛麝香圓川烏大八角者三個生用全蝎二十一個生黒豆三十一粒生用地龍半两生右為細末入麝半分同研匀糯米糊為丸如菉豆大每服七丸甚者十丸夜卧令鬲空温酒下微出冷汗一身便差予得此方凡是癧節及不測疼痛一二服便差在歙州日有一貴家婦人徧身走注疼痛至夜則發如蟲嚙其肌多作鬼邪治子曰此正癰節病也三服愈癧節宜發汗麻黄散麻黄一両一分羌活一両黄芩三分細辛真華隂者黄茋右為粗末毎服五錢水二盞煎至八分去滓温服接續三四服有汗慎風治癧節腫滿疼痛茵芋圓茵芋硃砂薏苡仁各一分牽牛子一兩半郁李仁半兩右為細末煉蜜杵丸如梧子大輕粉滚為衣毎服十至十五至三十丸五更初温水下到晚未利可二三服快利為度白粥将息治風熱或癧節攻手指作赤腫麻木甚則攻肩背両膝遇暑熱或大便閉即作牛蒡子散牛蒡子三両新豆豉炒𦍑活各一両生地黄二両半黄茋一両半右為細末湯調二錢空心食前日三服此病多胸鬲生痰久則赤腫附著肢節久久不退遂成厲風此孫真人所預戒也宜早治之治厲風手指攣曲節間疼不可忍漸至㫁落萆麻圓萆麻去殻黄連剉如豆各二両右以小瓶子入水一升同浸春夏三日秋冬五日後用萆麻子一粒擘破面東以浸藥水吞下平旦服漸加至四五粒㣲利不妨水少更添忌動風物累用得效神良栢葉丸柏葉麻黄山梔子枳殻𦍑活羊肝石白蒺藜升麻子芩防風牛蒡子荆芥茺蔚子大黄各半両苦参一両烏蛇一條右為細末毎服二錢温水調下日七八服龎老方治風毒瘡如大風疾緑灵散用桑葉洗熟蒸日乾為末水調二錢日服四五丸治走疰癧節諸風軟痛卒中倒地跌撲傷損趂痛圎草烏頭三両半去皮尖熟地黄南星半夏麯白僵蚕烏藥各半両並日乾右為細末酒糊丸如梧子大日乾毎服五七粒空心夜卧温酒下如跌撲痛用姜汁和酒研十數粒搽之如卒中倒地姜汁茶清研五六丸灌下立醒大智禅師方治宿患風癬遍身黒色肌體如木皮膚粗澁及四肢麻痺烏頭圓草烏頭一觔入竹籮子内以水浸用瓦子於籮内就水中瀧洗如打菱角法直候瀧洗去大皮及尖腔起令乾用麻油四両塩四両入銚内炒令深黄色傾出油只留塩並烏頭再炒令黒色烟出為度取一枚劈破心内如米一㸃白恰好也如白多再炒趂熱杵羅為末用醋糊丸如梧子大乾之毎服三十丸空心晚食前温酒下真州資福文雅白老元祐間有此疾服此數年肌體黒㸃頓除脚力强健視聼不衰有一宗人遍身紫㸃風身如墨服踰年體悦澤教予服之亦得一年許諸風瘡疹瘍皆除然性差熱雖制去毒要之五七日作烏頭粥啜之為佳法用預章集中者治風痰停飲痰癖嗽治停痰宿飲化痰圓半夏湯洗三次别末人參白茯苓白术桔梗切作小片薑汁浸各一兩枳實香附子前胡甘草各半兩右為細末用半夏薑汁煮糊丸如梧子薑湯下三四十丸治中腕風痰涎飲眩瞑嘔吐酸水頭疼惡心三生圓半夏二兩南星白附子各一兩右並生為末滴水丸如梧子大以生麵滚衣隂乾每服十丸至二十丸薑湯下治心腹中腕痰水冷氣心下汪洋嘈雜腸鳴多睡口中清水自出脇肋急脹痛不欲食此胃氣虚冷所致其脉沉弦細遲旋覆花湯旋覆花細辛橘皮桂心人參甘草桔梗白芍藥半夏各半兩茯苓三分右為粗末毎服四錢水盞半薑七片煎八分去滓温服治心下停飲冷痰頭目瞑眩睡卧口多涎梹榔丸梹榔三分丁香半夏一兩細辛乾薑人參各半兩右為細末薑汁煮糊丸如梧子薑湯下二三十丸日三服治酒癖停飲吐酸水乾薑丸聖惠方乾薑葛根枳殻橘紅前胡各半兩白术半夏麯山茰肉甘草各一分右為細末煉蜜丸如梧子每服三十丸用飲下治積聚停飲痰水生蟲久則成反胃及變為胃癰其説在靈樞及巢氏病源芫花圎芫花醋製乾稱一兩乾漆狼牙根桔梗炒黄藜盧炒梹榔各半両巴豆十粒去殻炒微黒右為細末醋糊丸如赤豆大每服二三丸加至五六丸食前姜湯下此方常服化痰消堅殺蟲予患飲癖三十年暮年多嘈雜痰飲来潮即吐有時急飲半杯即止盖合此證也因讀巢氏病源論酒瘕云飲酒多而食榖少積久漸瘦其病常思酒不得酒即吐多睡不復能食是鬲中有蟲使然名為酒瘕此藥治之要之須禁酒即易治不禁無益也予生平有二疾一則臟腑下血二則鬲中停飲下血有時而止停飲則無時始因年少時夜坐為文左向伏几案是以飲食多墜向左邉中夜以後稍困乏必飲両三杯既卧就枕又向左邉側睡氣壮盛時殊不覺三五年後覺酒從左邉下漉漉有聲脇痛飲食殊減十數日必嘔吐数升酸水暑月止是右邉身有汗褺褺常潤左邉病處燥無汗遍訪名毉及海上方服之少有驗間或中病止得月餘復作其補則如天雄附子礬石其利則如牽牛甘遂大㦸偹嘗之矣予復揣度之已成癖囊如潦水之有科臼不盈科不行水盈科而行也清者可行濁者依前停留盖下無路以决之也是以積之六七日必吐而去稍寛數日復作也脾土惡濕而水則流濕莫若燥脾以勝濕崇土以填科則此疾自去矣於是悉屏諸藥一味服蒼术三月而疾除自此一向服數年不吐不嘔胸鬲寛飲啖如故暑月汗周身而體凉飲亦當中下前此飲漬其肝目亦多昏眩其後燈下能書細字皆蒼术之力也其法蒼术一觔去皮切末之用生麻油半両水二盞研濾取汁大棗十五枚爛煮去皮核研以麻汁勻研成稀膏搜和入臼熟杵丸如梧子大乾之毎日空腹用温湯吞下五十丸加至一百丸二百丸忌桃李鵲鴿初服時必鬲㣲燥且以茅术製之覺燥其進山梔散一服久之不燥矣予服半年以後止用燥烈味極辛者削去皮不浸極有力亦自然不燥也山梔散用山梔子一味乾之為末沸湯㸃服故知久坐不可伏向一邉時或運動亦消息之法治肺氣風寒作嗽紫蘇散紫蘇桑白皮青皮五味子杏仁麻黄甘草各等分右為粗末每服二錢水一盞煎至七分温服利鬲去涎思食止嗽訶子湯訶子煨去核青皮麥冬各半兩梹榔四個半夏三分甘草一分右為粗末每服四錢水二盞薑七片煎七分温日三服治諸嗽久不差貝母湯貝母一兩去心薑製半日焙黄芩生用乾薑生各一兩陳皮五味子各一兩桑白皮半夏柴胡桂心各半兩木香甘草各一分右為粗末毎服五錢水一盞半杏仁七粒去皮尖碎之生姜七片同煎至七分去滓熱服黄師文云戊申冬有蔣姓者其妻積年嗽製此方授之一服差以此治諸嗽即皆愈積聚凝滯五噎鬲氣大抵治積或以所惡者攻之以所喜者誘之則易愈如碙砂水銀治肉積神麯麥芽治酒積水蛭䖟蟲治血積木香梹榔治氣積牽牛甘遂治水積雄黄膩粉治涎積礞石巴豆治食積各從其類也若用羣隊之藥分其勢則難取效嗣宗所謂譬猶獵不知兎廣絡原野冀一人獲之術亦踈矣湏是認得分明是何積聚然後增減用藥不爾又有所損嗣宗自謂不著書在臨時變通也治五種積氣及五噎胸鬲不快停痰宿飲纒金丹丁香木香沉香梹榔官桂胡椒碙砂研白丁香各一分肉豆蔲飛礬各一分馬兠鈴炒南星五靈脂𤓰簍根半夏各半両硃砂三分留半為衣右為細末入二味研藥和勻生姜汁煮糊丸如梧子大每服三丸生姜湯下或乾嚼蘿蔔下治心下蓄積痞悶或作痛多噫敗卵氣枳殻散枳殻白术各半兩香附子一両梹榔三錢右為細末毎服二錢米飲調下日三服不拘時候龎老方治伏積注氣發則喘悶訶子圓訶子白茯苓桃仁枳殻桂心梹榔鱉甲桔梗白芍藥川芎川烏人参橘紅各等分右細末煉蜜杵丸如梧子大酒下二十丸熟水亦得治一切積聚有飲心痛碙砂圓碙砂荆三稜别末乾薑香白芷巴豆去油各半兩大黄别末乾漆各一兩木香青皮胡椒各一分梹榔肉荳蔲各一個右為細末釅醋二升煎巴豆五七沸後下三稜大黄末同煎五十沸入碙砂同煎成稀膏稠希得所便入諸藥和匀杵丸如菉豆年深氣塊薑湯下四五丸食積熟水下白痢乾薑湯下赤痢甘草湯血痢當歸湯葱酒亦得治男子婦人患食勞氣勞徧身黄腫欲變成水及乆患痃癖小腸膀胱靣目悉黄紫金丹胆礬三両黄䗶一両青州棗五十個右於磁合内用頭醋五升先下礬棗漫火熬半日以来取出棗去皮核次下䗶一處更煑半日如膏入好䗶茶末二両同和丸如梧子大每服三十丸茶酒任下如乆患漏風痔漏陳茶飲下宋室趙彦才下血靣如臈不進食蓋酒疾也授此方服終劑而血止靣色鮮潤食亦倍常新安有一兵士亦如是與三百丸作十服亦愈治沉積感應圓丁香木香各半兩乾薑一兩百草霜二兩研肉荳蔲二十個巴豆七十粒取霜杏仁一百四十粒煑酒臈四兩麻油一兩秋冬増半兩臈減半兩右以二香薑蔲為細末并三味研極匀煉油蠟和成劑油紙裹旋圓如菉豆大熟水下五十丸此藥近年盛行於世有数方惟此真高予家得之於王景長用之的有效治五種積氣三焦痞塞胸鬲滿悶背膐引疼心腹膨脹脇刺痛飲食不下噎塞不通嘔吐痰逆口苦吞酸羸瘦少力短氣煩悶常服順氣寛中消痃癖積聚散驚憂恚氣宜服枳殻散枳殻荆三稜橘皮益智仁蓬莪术梹榔肉桂各一兩乾薑厚朴甘草青皮肉荳蔲木香各半兩右為細末每服二錢水一盞生薑三片棗一枚同煎至七分熱服鹽㸃亦得不拘時服治氣食憂勞思慮五噎鬲氣圓半夏桔梗各二兩肉桂枳殻各一兩半右細末薑汁和丸如梧子薑湯下三十丸食後臨卧服治胸鬲悶塞作噎薰鬲圓麥門冬甘草各半兩人參桂心細辛川椒逺志去心炒附子乾薑各一錢右細末蜜丸如雞豆大綿裹一丸含化食後日夜三服膀胱疝氣小腸精漏治膀胱疝氣外腎腫脹痛不可忍念珠圓乳香碙砂各三錢飛黄䗶一兩右乳香研細與碙砂同研匀鎔臈和丸作一百单八粒以綿穿之露一夕蛤粉為衣旋取一丸用乳香湯吞下頃年有人貨疝氣藥肩上擔人我二字以為招目貨日数千有一國毉多金得之用之良騐碙砂圓木香沉香巴豆肉金者各両青皮二両不去皮銅青半両研碙砂一分研右上二香青皮三味細剉同巴豆漫火炒令紫色為度去巴為末入青砂二味研勻蒸餅和丸如梧子大每服七丸至十丸鹽湯吞下二三服空心食前服治膀胱腫硬牽引疼痛及治小腸氣隂囊腫毛間水出金鈴圓金鈴子肉五両小茴香炒馬蘭花炒兎絲子海蛤破故紙海𢃄各三両木香丁香各一両右細末糊丸如梧子大每服二三十丸温酒鹽湯下空心食前服治小便難小腸脹不急治殺人右用葱白三觔細剉炒令熱以帕子裹分作両處更替熨臍下即通治膀胱氣痛茴香散茴香金鈴子肉蓬莪术荆三稜各一兩甘草半兩炙右細末每服二錢熱酒調下強㓜安云每發痛甚連日只二三服立定頃在徽城日歙尉宋荀甫膀胱氣作疼不可忍毉者以剛劑與之愈疼甚小便不通三日矣臍下虚脹心悶予因候之見其靣赤黒脉洪大予曰投熱藥太過隂陽痞塞氣不得通為之奈何宋尉尚持四神丹數粒云毉者謂痛不止更服此予曰若服此定斃後無悔渠懇求治予適有五苓散一兩許分三服易其名用連鬚葱一莖茴香一撮鹽一錢水一盞半煎八分令接續三服中夜下小便如黒汁者一二升臍下寛得睡翌日診之脉已平矣續用碙砂丸與之數日差大抵此疾因虚得之不可以虚而驟補藥經云邪之所凑其氣必虚留而不去其病則實故必先滌所蓄之邪然後補之是以諸方多借巴豆氣者蓋謂此也治遺精夢漏關鎖不固金鎻丹亦名茴香圓舶上茴香胡蘆巴破故紙白龍骨各一兩木香一兩半胡桃肉三七個研羊石子三對切開鹽半兩擦炙熟研如膏右五味為末下二味同研成膏和酒浸蒸餅杵熟丸如梧子大每服三五十丸空心温湯下治經絡熱夢漏心忪恍惚鬲熱清心圓右好黄蘖皮為細末用生腦子一錢同研勻煉蜜丸梧子大每服十丸至十五丸濃煎麥冬湯下大智禪師方夢遺不可全作虚冷亦有經絡熱而得之也猪苓圓右用半夏一两破如豆大用木猪苓四両先将一半炒半夏黄色不令焦地上出火毒半日取半夏為末糊丸如梧子大候乾更用前猪苓末二两炒㣲裂同用不泄沙瓶養之空心温酒鹽湯下三四十丸常服於申未間冷酒下此藥治夢遺有数種下部虚憊精不禁者宜服茴香丸年壮氣盛乆節淫慾經絡壅滯者宜服清心丸有情慾動中經所謂所願不得名曰白淫餌良方茯苓散正似瓶中煎湯氣盛而溢者如瓶中沸湯而溢慾動心邪者如瓶之傾側而出虚憊不禁者如瓶中有鏬而漏不可一槩用藥也又有一說經曰腎氣閉即精泄素問云腎者作強之官伎巧出焉又曰腎氣藏精蓋腎能攝精氣以生育人倫者也或斂或散皆主於腎今也腎氣閉則一身之精氣無所管攝故妄行而出不時也猪苓圓一方正為此設此古方也今盛行於時而人多莫測其用藥之意蓋半夏有利性而猪苓導水蓋導腎氣使通之意也予藥囊中嘗貯此藥緩急以與人三五服皆隨手而騐林監丞庇民亦数服而愈類證普濟本事方卷三
