body:
  text: 類證普濟本事方卷四宋許叔微撰反胃嘔吐治反胃附子散附子一枚極大者放於磚上四靣著火漸漸逼熱淬入薑汁中再用火逼再淬約盡薑汁半碗焙乾末之每服二錢水一盞粟米少許同煎七分不過三服鯽魚散大鯽魚一個去腸留膽納緑礬末填滿縫口以炭火炙令黃色乾為末每服一錢米飲調下日三服定嘔吐利鬲枇杷散枇杷葉去毛人參各一錢茯苓半兩茅根二兩切半夏一錢右細銼每服四錢水盞半薑七片漫火煎七分去滓入檳榔末半錢和勻服食後多吐欲作反胃白术散澤㵼白术茯苓各等分右為細末每服一錫湯調溫服治胃熱嘔吐竹茹湯乾葛三兩甘草三錢半夏三錢薑汁半盞漿水一并煮耗半右每服五錢水二盞薑三片竹茹一團大棗一枚煎一盞溫服有熱者手足心熱政和中一宗人病傷寒得汗身凉數日忽嘔吐藥與飲食俱不下醫者皆進丁香藿香滑石等藥下咽即吐豫曰此正汗後餘熱留胃腕孫兆竹茹湯政相當耳急治藥與之即時愈良方槐花散亦相類治霍亂吐㵼不止及轉筋諸藥不效者一丸治一人青金丹硫黃一兩研水銀八錢以二味銚內炒栁木不住攪勻栁枝蘸冷醋頻灑候如鐵色法如青金塊方成刮下研如粉留小半為散餘以粽子尖三個約半盞研稀稠得所成膏和丸如雞豆硃砂為衣每服一丸丁香湯磨熱服如服散子丁香湯調下一錢傷寒隂陽乘伏用龍腦冷水磨下日二三服治嘔吐不止香靈圓丁香好辰砂研各六錢五靈脂四錢右香脂先細末後入砂再研勻狗膽或猪膽為丸如雞豆大每服一丸生薑橘皮湯磨下臟腑瀉滑及諸痢治脾胃不和泄瀉不止諸藥不效訶子圓訶子皮川皮肉豆蔲龍骨木香赤石脂附子各等分右細末糊丸如梧子大每服四十丸米飲下治脾胃中風濕臟腑泄滑鞠藭丸芎藭神曲白术附子各等分右細末糊丸如梧子每服三五十丸米飲下芎藭能除濕豫嘗加术附製方治脾濕而泄者萬中亦治飱泄素問曰春傷於風夏必飱泄飱泄者食榖不化蓋春木旺時肝生風邪淫於脾經至夏餘冷當風故多飱泄此藥尤宜磨積止泄痢治心腹冷痛陳麯丸陳麯一兩半乾薑官桂白术當歸厚朴人參甘草各半兩右末煉蜜丸梧子大每服三四十丸或酒或淡醋湯空心食前日二服發時不拘時增數治冷氣下瀉木香圓木香半兩川烏一兩生右細末醋糊丸如梧子大陳醋湯下三五十丸治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先取去然後調治易差不可畏虛以養病也溫脾湯厚朴乾姜甘草桂心附子生各二兩大黃生四錢切研湯一盞漬半日搗去滓煎湯時和汁下右細銼水二升半煎八合後下大黃汁再煎六合去滓澄去腳不要晚十分三服溫溫自夜至曉令盡不㥅食前更以乾姜丸佐之乾姜圓乾姜巴豆去心炒黃研大黃人參各一兩右除巴豆餘為末同研煉蜜丸如梧子大服前湯時用湯吞下一丸米飲亦可有人因憂愁中傷食結積在腸胃故發吐利自後至暑月稍傷則發暴下數日不巳玉函云下利至鬲年月日不期而發者此為有積宜下之止用溫脾湯尤佳如難取可佐以乾姜丸後服白术散白术木香附子人參各等分右細末每二錢水一盞薑三片棗一枚煎六分溫服治積痢靈砂丹碙砂一分硃砂一分并研極細右用黃蠟半兩巴豆三七粒去殼皮膜同放於銀石器內重湯煮一伏時候巴豆紫色為度去二七粒止將一七粒與前來二味再同研極勻再溶蠟匱藥每旋丸菉豆大每服三丸至五丸水㵼薑湯下白痢艾湯赤白烏梅湯服時須極空腹服畢一時不可吃食臨卧尤佳次食淡粥一日瘧疾乳香湯下靣東服不發日晚間服此藥不動氣服之瀉者止痢者斷疼者愈有積者內化亦不動臟腑大凡痢有沉積者不先去積雖得暫安後必為害記陳侍郎涇仲庚戌秋過儀真求診初不覺其有疾及診視則肝脉沉弦附骨取則牢豫曰病在左脅有血積必發痛陳曰誠如是前此守九江被召冒暑涉長江暨抵行朝血痢已數日矣急欲登對醫者以剛劑燥之雖得止數日臍下一塊大如杯不旬日如碗大發則不可忍故急請公視以歸為之奈何豫曰積痢不可强止非抵當丸不可渠疑而不服次年竟以此終治隔年痢不止木香散木香用黃連半兩銼各炒甘草炙一兩櫻粟殼銼同薑汁半兩炒右細末入麝少許研勻陳米飲下二錢佛智和尚𫝊云在閩人嘗合以濟人治血痢尤竒治腎泄五味子散五味子二兩吳茱茰半細粒緑色者右二味用炒香熟為度細末每服二錢陳米飲下頃年有一親識每五更初欲曉時必唐痢一次如是數月有人云此名腎泄腎感隂氣而然得此方服而愈虛熱風壅喉閉清利頭目治虛煩上盛脾腑有熱咽喉生瘡利鬲散雞蘇葉荆芥穗防風桔梗人參牛蒡子隔紙炒甘草各一兩右細末每服一錢沸湯調服如咽痛口瘡甚者加薑蠶一兩治風盛鬲壅鼻塞清涕熱氣攻眼下淚多眵齒間緊急偏頭疼川芎散川芎柴胡各一兩半夏麯甘草炙甘菊細辛人參前胡防風各半兩右粗末每服四錢水一盞薑四片薄荷五葉煎七分溫服治頭痛靣赤煩悶咽乾上鬲風痰頭目暈昏百節疼痛背項拘急芎辛丸川芎防風僵蠶獨活各一兩桔梗三兩天麻四兩細辛白附子羌活甘草各半兩薄荷荆芥各一兩右細末煉蜜丸如梧子大食後每服一丸茶酒吞下治上焦虛熱肺腕咽膈有氣如烟搶上通鬲丸黃連茯苓人參各三兩硃砂一分真腦子少許右細末研勻煉蜜丸如梧子熟水下三五丸日二三服治心經有熱門冬丸麥門冬一兩川黃連半兩右細末煉蜜丸如梧子食後熟水下二三十丸治心熱千金地黃丸川黃連四兩粗末生地黃半斤研取汁連滓二味拌勻日乾右細末煉蜜丸如梧子每服三十丸食後麥冬湯下治邪熱客於經絡肌熱痰嗽五心煩熱頭目昏痛夜多盜汗此藥補和真氣解勞倦婦人血熱虛勞骨蒸並皆治人參散人參白术白茯苓柴胡半夏麯當歸赤芍藥乾葛甘草各一兩子芩半兩右為細末每服三錢水一盞薑四片棗二枚煎八分不拘時候帶熱服但是有勞熱證皆可服熱退即止大抵透肌解熱干葛第一柴胡次之所以升麻葛根湯為解肌之冠也調榮衛順三焦治風壅消痰涎退煩熱清氣散前胡柴胡川芎枳殼白术青皮羌活獨活甘草茯苓人參各等分右為末每服二錢水一盞荆芥一穗煎七分服此方敗毒散中去桔梗加白术青皮增損亦有理用之良驗治邪入經絡體瘦肌熱推陳致新解利傷寒時疾中暍伏暑柴胡散柴胡四兩甘草一兩右為末每服二錢水一盞煎八分食後熱服此藥冬月可以潤心肺止咳嗽除壅熱春夏可以禦傷寒時氣解暑毒居常不可缺不論長幼皆可服倉卒可以便得治骨蒸肌熱解一切虛煩躁生津液地仙散地骨皮洗防風各一兩甘草一分右為末每服二錢水一盞生姜三片竹葉七片煎至七分服信效方增人參半兩雞蘇一兩甘草添一分腫漏水氣蠱脹治腹中有濕熱氣自下作腫如新卧起之狀兩足跟微腫病在腎腎少隂也標在肺肺者太隂也故中滿氣急咳嗽喘息有音每就卧則右脅有氣上衝肩掖與缺盆相牽引不快少思飲食葶藶圓甜葶藶半兩郁李仁湯去皮熬紫色稱三分二味别研如膏令極勻白术半兩牽牛子半兩一半生一半熟用桑白皮赤茯苓漢防己羌活陳橘皮澤瀉以上各三分右細末與上二味同研煉蜜和入臼內治之九如梧子大初服十丸空心晚食前日二服生姜橘皮湯下不知加至二三十圓以知為度治脾元虛浮腫實脾散大附子一個草果乾薑各二兩甘草一兩大腹皮六個木瓜一個去穰切片右於砂器水煮劈開乾薑心內不白為度不得全令水乾恐近底焦取出銼焙為末每空心日午用沸湯㸃服治水氣羌活散羌活蘿蔔子各等分右同炒香熟去蘿蔔子不用末之溫酒調下二錢一日一服二日二服三日三服取效嘉興簿張昌方治四肢腫滿大棗湯白术三兩㕮咀每服半兩水一盞半大棗三枚拍破同煎九分去渣溫服日三四服不拘時候治腫滿小便不利茯苓散郁李仁四錢檳榔二個赤茯苓白术甘遂切片炒各一錢橘皮一錢半右細末每服一錢薑棗湯下又方厚朴半兩牽牛子二兩炒取末二兩右細末每服二錢薑棗湯調下治游風攻頭靣或四肢作腫塊知母湯知母一兩麻黃黃茋甘草羌活白术枳殼各半兩右粗末每服四錢水一盞半牛蒡子一百粒研碎煎至七分溫日三四服覺冷不用牛蒡子有一達官其母年七十中風拘攣平日止是附子之類扶養一日靣浮腫手背亦腫尋常有一國醫供藥診之是水病欲下大㦸牽牛以導之其家大驚憂惶召豫議之豫曰素問種靣腫曰風足脛腫曰水此服附子太過正虛風生熟之證咽必噎塞鬲中不利誠然豫乃進升麻牛蒡丸參湯繼以知母湯三日便愈常見一醫書中論水蟲三病臍腹四肢悉腫者為水但腹脹四肢不甚腫者為蠱有中表一婦人患蠱病豫謂不可下當實脾不然之卒後入棺木腹與棺蓋平治蠱宜石中黃丸腎臟風及足膝腰腿腳氣等疾治腎臟風攻注腳膝方連枝甘遂一兩木鱉子二個一雌一雄去殼右為末獖猪腰子二個批開藥末一錢摻勻濕紙裹數重漫火煨熟放溫五更初細吞米飲下積水多則利多少則少也宜軟飯將息若患一腳切看左右如左腳用左邊腰子右用右邊者藥末止一錢壬子年在毗陵有姓馬人鬻酒久不見因詢其親云宿患腎臟風今一足發腫如瓠自腰以下巨細通為一律痛不可忍卧欲轉側則兩人挾持方動或者欲以鈹刀决之豫曰未可豫有藥各當以贈如上法服之辰巳間下膿如水精者數升即時痛止腫退一月後尚拄拐而行豫再以赤烏散令捺貼其膝方愈後十年過毗陵率其子列拜以謝云向腳疾至今不復作雖積年腎藏風并已失去今健步自若矣治腎藏風上攻下疰生瘡并癰烏頭圓川烏二兩天麻地龍去土稱白附子各半兩甘附子一兩二味以黑豆半升煮透去皮臍切碎日乾右為細末酒糊丸如梧子大每服二三十丸空心食前鹽湯下去風補血益氣壯筋骨强腳力虎骨酒虎脛骨真者萆薢仙靈脾薏苡仁牛膝熟地黃各二兩右細銼絹袋盛浸酒二斗飲子一盞入一盞可得百日婦人去牛膝治腰腳疼痛攣急不得屈伸及腿膝冷麻虎骨酒虎骨一具及脛骨二莖用酥搽炙黃捶碎同無灰酒三斗密封七日空心晚食溫之隨意飲治腳氣檳榔湯檳榔末三錢生薑三片紫蘇七葉陳橘三枚右以水一大盞煎七分去滓熱服少府監韓正彥暴得疾手足不舉諸醫以為風針灸臂腿不知痛孫兆作腳氣與此藥乃愈益氣補血肝元袪風溫壯腳膝地黃圓熟地黃一兩牛膝石斛各三分肉蓯蓉茵芋附子薏苡仁桂心防風川芎五味子各半兩右為末煉蜜丸如梧子大每服三四十丸酒吞下空心食前服治肝腎風虛氣弱腳不可踐地腰脊疼痛風毒流疰下經行止艱難小便餘瀝此藥補五臟內傷調中益精凉血堅强筋骨益智輕身耐老思仙續斷圓思仙木五兩即杜仲也五加皮防風薏苡仁羌活川續斷牛膝各三兩萆薢四兩生地黃五兩右細末好酒三升化青鹽三兩用大木瓜半斤去皮子以鹽酒煮木瓜成膏和杵丸如梧子大每服三四十丸空心食前溫酒鹽湯下膏子少益以酒糊治兩腳軟弱虛羸無力及小兒不能行續骨丹天麻明净大者酒浸一日白附子牛膝木鱉子各半兩烏頭一分炮川羌活地龍去土一分的乳真沒藥各二錢硃砂一錢右生天南星末一兩無灰酒煮糊丸如雞豆大硃為衣薄荷湯磨一丸食前服治風氣積滯成腳氣常覺微腫發則痛茵芋圓茵芋炒郁李仁一兩牽牛子三兩生取末一兩半右細末煉蜜丸如梧子大每服二十丸五更薑棗湯下未知加至三十丸日三次為度白粥補治腰腳走注疼痛此是腳氣薏苡仁圓薏苡仁茵芋白芍藥牛膝川芎丹參防風獨活各半兩熟地黃側子一個桂心橘紅各一兩右細末煉蜜丸如梧子大每服三四十丸酒下食前日三服木瓜湯下亦可今人謂之腳氣者黃帝所謂湲風溫脾也千金云頑弱名湲風疼痛為溫痺大抵此疾不可以三五便效須久服得力唐張文仲云風有一百二十四種氣有八十種惟腳氣頭風上氣嘗須服藥不絶自餘則隨其發動臨時消息但有風氣之人春末夏初及秋暮得通泄則不困劇所謂泄通者如麻黃牽牛郁李仁之類是已不必苦駚利藥也治腎虛腰痛鹿茸丸鹿茸不拘多少切作片子酥炙黃末之酒糊丸如梧子大空心食前鹽湯下三五十丸治腿腰痛氣滯藥碁子牽牛不拘多少用新瓦入火煿得通紅便以牽牛頓在瓦上自然一半生一半熟不得撥動細研取末一兩入硫黃一分同研勻分三分每用白麵一匙水和捍開切作碁子五更初以水一盞煮熟連湯溫送下住即巳未住隔日再作豫嘗有此疾每發一服即止痛病源曰腿腰痛者或墮傷腰是以痛類證普濟本事方卷四
