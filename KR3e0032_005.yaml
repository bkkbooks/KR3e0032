body:
  text: 類證普濟本事方卷五宋許叔微撰腸風下血痔漏臟毒治腸風瀉久不止玉屑散槐根白皮去粗皮苦楝根去皮各三兩椿根白皮四兩三味於九月後二月前取軟者日乾天南星半夏各半兩並生葳靈仙一兩寒食麵三兩右為末滴水丸如梧子大乾之每服三十丸水八分一盞煎沸下丸子煮令浮以匙抄起溫溫送下不嚼空心食前服頃年有一人下血幾碗頓然瘦薾諸藥皆不效豫曰此正腸風令服玉屑丸三服止豫苦疾三十年蓄下血藥方近五十餘品其間或驗或否或始驗而久不應者或初不效棄之再服有驗者未易立談大抵此病品類不同對病則易愈如下清血色鮮者腸風也血濁而色黯者臟毒也肛門射如血線者蟲痔也亦有一種下部虛陽氣不升血隨氣而降者仲景云脉弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相摶此名為革婦人則半産漏下男子則亡血失精此下部虛而下此者也若得革脉却宜服溫補藥蟲痔宜薰千金用蝟皮艾者佳豫嘗作頗得力治臟毒蒜連圓鷹爪黃連末用獨蒜頭一個煨香爛熟研和入臼治熟如梧子大每服三四十丸陳米飲下治腸風臟毒槐花散槐花炒柏葉爛杵焙荆芥穗枳殼右修事了方稱等分細末用清米飲調下二錢空心食前服巢氏病源論腸癖為痔久困飽食過度房室勞損血氣流溢滲入大腸衝發於下時便清血腹中賴痛病名脈痔又論脾毒腸風本緣榮衛虛弱風氣進襲因熱乘之使血氣流散積熱壅遏血滲腸間故大便下血椿皮圓臭椿花四兩刮去粗皮焙乾蒼术枳殼各二兩右細末醋糊丸如梧子空心食前米飲下三四十丸治腸痔在腹內有鼠乳下血方白蕪荑貫衆狼牙根椿東引根白皮槐東引根白皮蝟皮炙焦各一分雄黃白鱔頭一個炙焦右細末臘月猪脂和一丸彈子大綿裹內下部日三易治痔有鼠乳結核作渴疼痛方皂角炙黃茋荆芥槐子穿山甲木香露蜂房炒焦蝟皮鱉甲醋炙桔梗芍藥各一分大黃半兩右細末煉蜜丸如梧子大每服二三十丸溫湯下食前日三服未知加至四五十丸治逺年腸風痔漏黃茋圓黃茋枳殼葳靈仙各二兩續斷炒槐角子枯礬當歸炒乾薑附子生地黃連翹炒各半兩右細末煉蜜丸如梧子大米飲下三十圓朝推官方治腸痔鱉甲散鱉甲蝟皮炙黑焦穿山甲炙焦白礬枯附子猪牙皂各半兩炙焦存性二分麝香一分研右細末研勻蒸餅丸如梧子大米飲下二十丸食前日三服又方槐花炒白礬枯各一兩附子半兩右細末蒸餅丸如梧子大每服二十丸米飲下食前日三服以上二方龎老𫝊衄血吐血咯血方治衄血無時茜梅圓茜草根艾葉各一兩烏梅肉焙乾半兩右細末煉蜜丸如梧子大烏梅湯下三十丸經云天暑地熱經水沸溢蓋血妄行陽勝隂也鞠運若茂之嘗苦此疾豫授此方令服後愈三黃散亦可三黃散大黃黃連黃芩各半兩右細末每服二錢新水調下蜜水亦可又方山梔子不拘多少燒存性末之搐入鼻中立愈蔡子渥傳云同官無錫監酒趙無疵其兄衄血甚已死入殮血尚未止偶有一道人過門聞其家哭詢問其由道人云是曾服丹或燒煉藥豫有藥用之即活囊中出此藥半錢吹入鼻中立止良久得活并傳此方治鼻衄過多昏冒欲死梅師方右用香墨研濃㸃入鼻中潤肺安血止嗽治吐血咯血天門冬圓天門冬一兩甘草杏仁貝母白茯苓阿膠各半兩右細末煉蜜丸如彈子咽津含化日夜服十丸不拘時候因嗽咯血成勞眼睛疼四肢倦腳無力黃茋散黃茋麥冬熟地桔梗各半兩甘草一分白芍藥半兩右粗末每服四錢水一盞半薑三片煎七分溫服日三服治久嗽咯血成肺痿多吐白涎胸鬲滿悶不食扁豆散白扁豆生薑各半兩枇杷葉去毛半夏人參白术各一分白茅根三分右細銼水三升煎至一升去滓下檳榔末一錢和勻分四服不拘時候治勞瘵吐血損肺及血妄行神𫝊膏剪草一斤婺台州皆有惟婺州者可用狀如茜草又如細辛每用一斤净洗為末入生蜜一斤和為膏以器盛之不得犯鐵九蒸九晒日一蒸晒病人五更起面東坐不得語用匙抄藥如粥服每服四匙良久用稀粟米飲壓之藥冷服粥飲亦不可大熱或吐或下皆不妨如久病肺損咯血只一服愈尋常咳嗽血妄行每服一匙可也有一貴人其國封病瘵其尊人嘗以此方畀之九日而藥成前一日病者夢人戒令翌日勿令服藥次日將服之為屋土墜器中不可服再合既成又將服為猫覆器又不得食又再作未就而是人卒矣此藥之異如此若小血妄行一啜而愈或云是陸農師夫人鄉人艾字先嘗親說此事渠後作大觀本草亦收入集中但人苦未識不信耳眼目頭面口齒鼻舌唇耳諸疾鎮肝明目羊肝圓羯羊肝一具新瓦盆中􅏼乾更焙之肝若大止用一半甘菊花羌活柏子仁細辛官桂白术五味子各半兩黃連三分右細末煉蜜丸如梧子大空心食前溫水下三四十丸又方白羯羊肝只用子肝一片薄切新瓦上煿乾熟地黃一兩半兔絲子澤瀉地膚子去殼防風黃芩白茯苓五味子枸把子茺蔚子杏仁大者炒細辛華隂者佳苦葶藶桂心麥箱子各一兩右細末煉蜜丸如梧子大每服三四十丸溫水下日三服不拘時候張臺卿嘗苦目暗京師醫者令灸肝愈遂轉不見物因得此方服之遂明有一男子內障醫治無效因以餘劑遺之一夕燈下語其家人曰適偶有所見如隔門縫見火者及旦視之眼中翳膜且裂如線張云此藥靈勿妄與人忽之則無驗豫隘之且欲廣其傳也又方羌活川芎旋覆花防風各半兩甘草蒼术泔浸一夕去皮日乾不見火楮葉桑皮並八月採隂乾稱以上各一兩甘菊花楮實蟬退木賊各一分右木臼中治為末茶清調下二錢早晚食後臨臥各一服暴赤眼亦治赤眼忌溫麩及酒楮葉須真無實者餘不堪否則諸藥悉無效合時不得焙及犯鐵器豫觀此方取楮葉必無實者蓋陰陽二物相配匹耳有實者陽也無實取葉者隂也所以不得真諸藥悉無效治肝腎風毒熱氣上衝眼痛菊花散甘菊花牛蒡子炒熟各八兩防風三兩白蒺藜去刺一兩甘草一兩半以上細术每服二錢熟水調下食後臨臥素問云久視傷血血主肝故勤書則傷肝主目昏肝傷則自生風熱氣上凑目其昏亦甚不可専服補藥須服益血鎮肝明目藥地黃圎熟地黃一兩半黃連决明子各一兩沒藥甘菊花防風羌活桂心光明硃砂各半兩右細末煉蜜丸如梧子大每服三十丸熟水下食後日三服讀書之苦傷肝損目誠然晋范寧嘗苦目痛就張湛求方湛戲之曰古方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子貢晋左太冲凡此諸賢並有目疾得此方云用損讀書一減思慮二專內視三簡外觀四旦起晚五夜早眠六凡六物熬以神火下以氣簇藴於胸中七日然後納諸方寸修之一時近能數其目睫逺視尺箠之餘長服不已動見墻壁之外非止明目並可延年審如是而行之不可謂之嘲戲亦竒方也治頭風冷淚龎安常二方甘菊花决明子各三分白术羌活川芎細辛白芷荆芥穗各半兩右細末每服一錢滚湯調下食後日三服又方川芎甘菊細辛白术白芷各一分右細末臘丸如黍米大夜臥納一丸目中一時辰換一丸荀牧仲頃年嘗謂豫曰有人視一物為兩醫者作肝氣有餘故見一為二教服補肝藥皆不驗此何疾也豫曰孫真人云目之系上屬於腦後出於腦中邪中於頸因逄身之虗其入深則隨目系於腦入於腦則轉轉則目系急急則目眩以轉邪中其晴所中者不相比則睛散睛散則岐故見兩物也令服驅風入腦藥得愈王檢正希臯昔患鼻額間痛或麻痺不仁如是者數年忽一日連口唇頰車髮際皆痛不可忍口難言飲食相妨左額與頰上常如糊急手觸之則痛豫作足陽明經絡受風毒傳入經絡血凝滯不行故有此證或者以排風小續命透氷丹之類與之皆不效豫製犀角升麻湯贈之服數日而愈犀角升麻湯上等犀角一兩一分真川升麻一兩防風羌活各三分川芎白附子甘草一分白芷黃芩各半兩右粗末每服四大錢水一盞半煎至八分去滓通口服食後臨卧日三四服足陽胃也經云腸胃為市又云陽明多血多氣胃之中腥羶五味無所不納如市廛無所不有也六經之中血氣俱多腐熟飲食故食之毒聚於胃故此方以犀角為主解飲食之毒也陽明經絡環唇挾口超於鼻交頞中循頰車上耳前過客主人循髮際至額顱故王公所患皆此一經絡也故以升麻佐之餘藥皆滌除風熱升麻黃芩専入胃經稍通醫者自能曉也治鼻塞清涕出腦冷所致通草辛夷各半兩細辛甘遂桂心芎藭附子各一兩右細末蜜丸綿裹納鼻中塞密封勿令泄氣丸如大麻子稍加微覺小痛搗姜為丸即愈此千金方也治腦冷所致此疾亦有朏熱者亦有肺寒者素問云膽移熟於朏則辛額鼻淵又曰泣涕者腦也腦滲為涕又曰肺之液為涕其來各有自矣當審詳之鼻淵者濁涕下不止清濁亦自異治肺風鼻赤􅖟老山梔為末溶黃䗶等分和為丸彈子大空心茶酒嚼下半月效忌酒炙煿又方右用枇杷葉去毛焙乾末之茶調下一二錢日三服治心脾壅熱生木舌腫脹𤣥參升麻大黃犀角各三分甘草半兩右細末每服三錢水一盞煎至五分溫服不拘時候治口生瘡方升麻一兩一分黃連三分右細末綿裹含汁咽治諸魚骨鯁久不出右以皂角末少許吹入鼻中得鯁出多祕此方治懸癰腫痛不下食𤣥參散𤣥參一兩升麻射干大黃末各半兩甘草一分右細末每服三錢水一盞煎七分放溫時時含咽良驗治聤耳出膿紅綿散白礬煆成白灰每用一錢入胭脂一匙研勻用棉杖子瀍去耳中膿及黃水盡用别棉杖子引藥入耳中令到底摻之即乾如壯盛之人積熱上攻耳出膿水不差用無憂散雄黃丸㵼三五行即差治腎虛耳鳴夜間睡著如打戰鼓覺耳內風吹更四肢抽痛黃茋圓黃茋獨莖者去蘆一兩白蒺藜炒瓦擦細揚去碎刺羌活去蘆各半兩黑附子大者一個羯羊腎一對焙乾右細末酒糊丸如梧子大每服三四十丸空心晚食前煨葱鹽湯下治男子二十嵗因瘡毒後腎經熱右耳聽事不真每心中不意則轉覺重虛鳴疼痛地黃圓生地黃一兩半桑白皮一兩磁石搗碎水淘三二十次去盡赤汁為度二兩枳殼羌活防風黃芩木通甘草各半兩右粗末每服四錢水盞半煎七分日二三服不拘時候治口乾煩躁生津液思食黃茋湯黃茋熟地黃白芍藥五味子麥門冬各三分白茯苓一分甘草半兩右粗末每服三錢水一盞半薑棗烏梅同煎去滓服類證普濟本事方卷五
