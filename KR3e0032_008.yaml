body:
  text: 類證普濟本事方卷八宋許叔微撰傷寒時疫治太陽中風陽脈浮隂脈弱發熱汗出惡寒鼻鳴乾嘔桂枝湯今傷風古方謂之中風桂枝芍藥各一兩半甘草一兩炙右粗末炒五錢水一盞半生薑三片棗一枚同煎至七分去滓温服若二三月病温宜陽且湯治太陽病頭痛發熱身疼惡風無汗而喘麻黄湯麻黄去節百沸湯煑去黄汁焙乾一兩半桂枝一兩甘草半兩右粗末每服五錢水盞半煎八分温服加減法並依活人書仲景論傷寒一則桂枝治中風二則麻黄治傷寒三則青龍治中風見寒脈傷寒見風脈三者如鼎立人皆能言之而不曉前人處方用藥之意故多不用也且脈浮而緩者中風也故嗇嗇惡寒淅淅惡風翕翕發熱仲景以桂枝對之浮𦂳而濇者傷寒也故頭痛發熱身疼腰痛骨節疼痛惡風無汗而喘仲景以麻黃對之至於中風脈浮𦂳傷寒脈浮緩仲景皆以青龍對之何也予常深究三者若證候與脈相對用之無不應手而愈何以言之風傷衛之氣也寒傷榮之血也榮行脈中衛行脈外風傷衛則風邪干陽氣陽氣未固發越而為汗是以自汗而表虚故仲景用桂枝以發其邪芍藥以治其血蓋中風則病在脈之外其病稍輕雖同日發汗特解肌之藥耳故仲景於桂枝證云令半身熱熱微似有汗者佳不可如水淋漓病必不除是知中風不可大發汗汗過則反動榮血邪氣乘虚而襲之故病不除也寒傷榮則寒邪入隂血而榮行脈中者也寒邪居脈中非特榮受病邪自内作則併與衛氣犯之久則浸淫及骨是以汗不出而熱齒乾以煩寃仲景以麻黃發其汗又以桂枝甘草助其發散以滌除内外之邪榮衛之病爾大抵二藥皆發汗而桂枝則發其衛之邪麻黃併榮衛治之亦自有深淺也何以驗之仲景桂枝第十九證云病常自汗出者此為榮氣和氣和者外不諧以衛氣不共榮氣諧和故爾榮行脈中衛行脈外復發其汗榮衛和則愈宜桂枝湯又第四十七證云發熱汗出者此為榮弱衛強故使汗出欲救邪風宜桂枝湯是知中風汗出者榮和而衛不和又第一巻云寸口脈浮而𦂳浮者為風𦂳者為寒風則傷衛寒則傷榮榮衛俱病骨節煩疼當發其汗是知傷寒脈浮𦂳者榮衛俱病也麻黃湯中併用桂枝此仲景之意也至於青龍雖治傷風見寒脈傷寒見風脈之病然仲景云汗出惡風者不可服之服之厥逆便有筋惕肉瞤之證故青龍一證尤難用須是形證諦當然後可行故王實大夫證治上用桂枝麻黃各半湯慎之也桂枝加附子湯前方桂枝湯内附子半兩如前入薑棗同煎有一士人得太陽病因發汗汗不止惡風小便澁足攣曲而不伸予診其脈浮而大浮為風大為虚予曰在仲景方中有兩證大同而小異一則小便難一則小便數用藥稍差有千里之失仲景第七證云太陽病發汗遂漏不止其人惡風小便難四肢微急難以屈伸者桂枝加附子第十六證云傷寒脈浮自汗出小便數心煩微惡寒脚攣急反以桂枝湯以攻其表此誤也閑之便厥咽中乾煩燥吐逆一則漏風小便難一則有汗小便數或惡風或惡寒病各不同也予用第七證桂枝加附子湯三啜而汗止佐以甘草芍藥湯足便得伸其第十六證治法見本方桂枝加厚樸杏子湯桂枝去皮芍藥各一兩甘草六錢三字厚樸六錢三字杏仁三錢去尖右剉如麻豆大炒五大錢水一盞半生薑五片肥棗二枚劈破同煎至八分温服覆取微汗戊申正月有一武臣為㓂所執置舟中􅀈板下數日得脱乘饑恣食良久解衣捫虱次日遂作傷寒自汗而鬲不利一毉作傷寒而下之一毉作解衣中邪而汗之雜治數日漸覺昏困上喘息高毉者愴惶失措予診之曰太陽病下之表未解㣲喘者桂枝加厚樸杏仁湯此仲景之法也指令毉者急治藥一啜喘定再啜褺褺微汗至晚身凉而脈已和矣毉曰某平生不曽用仲景方不知其神㨗如是予曰仲景之法豈誑後人也哉人自寡學無以發明耳大柴胡湯柴胡二兩黃芩芍藥各三分半夏六錢二字枳實二枚炒大黃半兩伊尹湯液論大柴胡同薑棗共八味今監本無脱之也右粗末抄五錢水一盞半薑五片肥棗一枚煎至八分去滓温服以利為度未利又服常記有人病傷寒心燥喜嘔後來寒熱毉以小柴胡與之不除予曰脈洪大而實熱結在裏小柴胡安能去之仲景云傷寒十餘日熱結裏復徃來寒熱者與大柴胡湯三服而病除大黃蕩滌藴熱傷寒中要藥王叔和云若不用大黃忍不名大柴胡須是酒洗生用為有力昔後周姚僧坦名毉也帝因發熱欲服大黃藥僧坦曰大黃乃是快藥至尊年髙不宜輕用帝不從服之遂至不起及元帝有疾諸毉皆謂至尊至貴不可輕脱宜用平藥僧坦曰脈洪而實必有宿食不用大黃必無差理元帝從之果下宿食乃愈合用與不用必心中明得諦當然後可又記有人患傷寒身熱目痛鼻乾不得卧大便不通尺寸脈俱大已數日一夕汗出予謂速以大柴胡下之毉駭曰陽明自汗津液已滿法當行蜜兊何苦須用大黃藥予謂曰子只知抱稳若用大柴胡此仲景不傳之妙公安能知之予力爭竟用大柴胡二服而愈仲景論陽明之病多汗者急下之人多謂已是自汗若更下之豈不表裏俱虚又如論少陰云少隂病一二日口乾燥者急下之人多論病發於隂得之日淺但見乾燥若更下之豈不隂氣愈盛舉斯二者則其他疑惑處不可勝數此仲景之書世人罕讀也予以謂不然仲景稱急下之者亦猶急當救表急當救裏凡稱急者有三處謂纔覺汗多未至津液乾燥便速下之則為徑㨗免致用蜜兌也若胸中識得了了方可無疑若未能了了悞用之反不若蜜兌之為稳也又記一鄉人傷寒身熱大便不通煩渴鬱冒毉者用巴豆藥下之乃得溏利病宛然如舊予視之陽明熱結在裏非大柴胡承氣等不可巴豆止去積安能蕩滌邪熱藴毒耶亟進大柴胡等三服得汗而解常謂仲景百十三方為丸者有五理中陷胸抵黨烏梅麻仁是以理方陷胸抵黨皆用大彈子煮化而服與湯散無異至于麻仁治脾約烏梅治濕􅉶皆用小丸以達下部其他逐邪毒破堅癖道閼血潤燥屎之類皆憑湯劑未聞用巴豆小圓藥以下邪氣也既下而病不除不免重以大黃樸硝下之安能無損也哉治濕温多汗白虎加蒼术湯知母六兩甘草炙二兩石膏一觔蒼术三兩粳米三兩右剉如麻豆大毎服四大錢水一盞半煎至八分去滓取六分清汁温服癸丑年故人王闕季夏得疾胸項多汗而足逆冷語毉者不曉雜進藥已經旬日予診之其脈闗前濡闗後數予曰當作濕温治蓋先受暑後受濕暑濕相摶是名濕温先以白虎加人參湯次以白虎加蒼术湯頭痛漸退足漸温汗漸止三日愈此病名賊邪也誤用藥有死之理有毉難曰何名賊邪予曰難經論五邪有實邪虚邪正邪微邪賊邪從後來者為虚邪從前來者為實邪從所不勝者為賊邪從所勝者為微邪自病者為正邪又曰假令心病中暑為正邪中濕得之為賊邪今心先受暑而濕邪勝之水尅火從所不勝斯謂之賊邪五邪之中最逆也難經又云濕温之脈陽濡而弱隂小而急濡弱見於陽部濕氣摶暑也小急見於陰部暑氣蒸濕也故經曰暑濕相摶名曰濕温是謂賊邪也不特此也予素有停飲之疾每至暑月兩足汗褻褻未嘗乾每服此藥二三盞即便愈黃蓍建中加當歸湯黃蓍當歸各一兩半白芍藥三兩桂一兩一分甘草一兩右粗末每服五錢生薑三片棗一枚水一盞半同煎至八分去滓取七分清汁日三服夜二服尺脈尚遲再作一劑昔有鄉人邱生者病傷寒予為軫視發熱頭疼煩渴脈雖浮數而無力尺以下遲而弱予曰雖麻黃證而尺遲弱仲景云尺中遲者榮氣不足血氣微少未可發汗予於建中湯加當歸黃蓍令飲翌日脈尚爾其家煎迫日夜督發汗藥去幾不遜矣予忍之但只用建中調榮而已至五日尺部方應遂投麻黃湯啜第二服發狂湏臾稍定略睡已中汗矣信知此事是難是難仲景雖云不避晨夜即宜便治毉者亦須顧其表裏虚實待其時日若不循次第暫時得安虧損五臟以促夀限何足貴也南史記范雲初為陳武帝屬官武帝有九鍚之命在旦夕矣雲忽感傷寒之疾恐不得與慶事召徐文伯診視以實懇之曰可便得愈乎文伯曰便差甚易只恐二年後不復起耳雲曰朝聞道夕死猶可况二年乎文伯以火燒地布楪葉設席置雲於上頃刻汗解裏以温粉翌日愈雲甚喜文伯曰不足喜也後二年果卒夫取汗先期尚促夀限况不顧表裏不待時日便欲速效乎每見病家不耐病未三四日晝夜促汗毉者隨情順意鮮不敗事故予書此為毉者之戒蜜兌法必用方中製度甚詳有一士人家病二人皆旬日矣一則身熱發汗大便不通小便如經神昏如睡診其脈長而大虚予用承氣湯下之而愈一則陽明自汗大便不通小便利津少口乾燥其脈亦大而虚予作蜜兌三易之下燥屎得溏利而解其家問曰皆陽明大便不通何治之異予曰二陽雖相似然自汗小便利者不可蕩滌五臟為無津液也然則傷寒大證相似與證稍有不可要在變通仔細斟酌正如格局㸔命維年月日時皆同而貴賤窮通不相侔者於一時之中又有淺深故此不可不謹治隂中伏陽破隂丹硫黄水銀各一兩陳皮青皮去白各半兩末右先將硫黄銚子内鎔次下水銀用鐡杖子打勻令無星傾入黒茶盞内研細入二味勻研用厚麩糊圓如桐子大每服三十圓如煩燥冷鹽湯下隂證令艾湯下頃年郷人李信道得疾六脈沉不見深按至骨則弱𦂳有力頭疼身温煩燥指末背冷中滿惡心更兩毉矣毉者不識止供調氣藥予因診視曰此隂中伏陽也仲景法中無此證世人患此者多若用熱藥以助之則為隂邪隔絶不能導引真陽返生客熱用冷藥則所伏真火愈見消鑠須用破散陰氣導達真火之藥使火升水降然後得汗而解予授此藥二百粒作一服冷鹽湯下不半時煩燥狂熱手足燥擾其家大驚予曰俗所謂換陽也須臾稍定略睡已中汗自昏達旦方止身凉而病除治婦人室女傷寒發熱或發寒熱經水適來或適斷晝則明了夜則諺語如見鬼狀亦治産後惡露方來忽爾斷絶小柴胡加地黄湯柴胡一兩一分人參半夏湯洗七次黃芩甘草生地黃各半兩右粗末每用五錢水二盞生薑五片棗二枚同煎至八分去滓温服辛亥中寓居毘陵學官王仲禮其妹病傷寒發寒熱遇夜則如有鬼物所憑六七日忽昏塞涎响如引鋸牙闗𦂳急瞑目不知人疾熱極危召予視予曰得病之初曽值月經來否其家云月經方來病作而經遂止得一二日發寒熱晝雖静夜則有鬼􅑂從昨日來涎生不省人事予曰此熱入血室證也仲景云婦人中風發熱惡寒月經適來晝則明了暮則譫語如見鬼狀發作有時此名熱入血室毉者不曉以剛劑與之遂致胸鬲不利涎潮上管喘急息髙昏冒不知人先當化其涎後當除其熱予急以一呷散投之兩時須涎下得睡省人事次授以小柴胡加地黃湯三服而熱隂不汗而自解矣又記一婦人患熱入血室證毉者不識用補血調氣藥函養數日遂成血結胸或勸用前藥予曰小柴胡用已遲不可行也無已則有一焉刺期門穴斯可矣予不能針請善針者而治之如言而愈或者問曰熱入血室何為而成結胸也予曰邪氣傳入經絡與正氣相摶上下流行或遇經水適來適斷邪氣乘虚而入血室血為邪迫上入肝經肝受邪則譫言而見鬼復入胆中則血結於胸也何以言之婦人平居水當養於木血當養於肝也方未受孕則下行之以為月既姙娠則中畜之以養胎及已産則上壅之以為乳皆血也今邪逐血併歸肝經聚於膽中結於乳下故手觸之則痛非湯劑可及故當刺期門也活人海蛤散治結胸今具於後婦人傷寒血結胸鬲揉而痛不可撫近海蛤散海蛤滑石甘草各一兩芒硝半兩右為末每服二錢雞子清調下小腸通利則胸隔血散膽中血聚則小腸壅小腸壅膽中血不流行宜此方小便血數行更宜桂枝紅花湯發其汗則愈活人書云此方疑非仲景然其言須有理姑存之治太陽病汗過不解頭眩筋惕肉瞤真武湯茯苓芍藥各三分附子一枚白术半兩加減法從本方右粗末抄五錢生薑五片水一盞半煎八分去滓温服日三服鄉里有姓京者以鬻純為業子年三十初得病身微汗脈弱惡風毉以麻黃藥與之汗遂不止發熱心多驚悸夜不得眠譫語不識人筋惕肉瞤振振動摇毉者又進驚風藥予曰強汗之過也仲景云脈微弱汗出惡風不可服青龍湯服之則筋惕肉瞤此為逆也惟真武湯可救進此三服優似清心圓竹葉湯數日遂愈白虎加人參湯方在活人書第六十五證有人病初嘔吐俄為毉者下之已七八日而内外發熱予診之曰當用白虎加人參湯或曰旣吐復下且重虚矣白虎可用乎予曰仲景云若吐下後七八日不解熱結在裏表裏俱熱者白虎加人参湯此正相當也蓋始吐者熱在胃腕而脈至今虚虚大三投湯而愈仲景旣稱傷寒若吐下後七八日不解熱結在裏表裏俱熱者白虎加人參湯主之又云傷寒脈浮發熱無汗其表不解不可與白虎湯又云脈浮滑此以表有熱裏有寒白虎湯主之國朝林億校正謂仲景於此表裏自差矣予謂不然大抵白虎能除傷寒中暍表裏發熱故後二證或云表裏俱熱或云表熱裏寒皆可服之中有一種脈浮無汗其表不解全是麻黃與葛根證安可用白虎也林但見所稱表裏不同便謂之差悞是亦不思之過也治傷寒汗後吃噫肉荳蔲湯肉荳蔲一箇石連肉炒茴香各一分丁香半分人參半兩枇杷葉五片拭去毛炙右剉細末用水四盞薑十片煎二盞去滓空心温分二服良薑湯桔皮良薑桂枝當歸各一分麻黃半兩杏仁二十箇甘草一分梹榔三箇别末右粗末用水四盞薑十片棗三枚同煎至二分去滓下梹榔末更煎三沸通口服一盞未已再作一盞龎老云傷寒吃噫不止是隂陽氣升降欲作汗升之不止故胃氣上逆為吃噫無休止宜此方又方枳殻半兩木香一錢右細末每服一錢白湯調下未知再與治傷寒衂血滑石湯滑石末不以多少飯圓如桐子大每服十圓微嚼破新水嚥下立止只用藥末一大錢飯少許同嚼下亦得湯晦叔云鼻衂者當汗不汗所致其血青黒時不以多少乃得止且温服和藥以調其榮衛纔見血鮮急以此藥止之桂枝湯方在前有人病發熱惡寒自汗脈浮而微弱三服湯而愈此方在仲景一百十三方内獨冠其首今人全不用何哉仲景云太陽中風陽浮而隂弱陽浮者熱自發隂弱者汗自出嗇嗇惡風淅淅惡寒翕翕發熱宜桂枝湯此脈與證仲景說得甚分明止是人㸔不透所以不敢用仲景云假令寸口脈㣲名曰陽不足隂氣上入陽中則灑淅惡寒也尺脈弱名曰隂不足陽氣下陷入隂中則發熱也此謂元受病不然也又曰陽微則惡寒隂弱則發熱毉發其汗使陽氣微又大下之令隂氣弱此謂毉所病而然也大抵隂不足陽徃從之故内陷而發熱陽不足隂徃乘之故隂上入陽中則惡寒舉此二端明白如何憚而不行桂枝哉治胃中有熱有濕有宿榖相搏發黃茵陳蒿湯茵陳蒿嫩者一兩半大黄三分梔子小者十枚右粗末每服一錢水盞半煎八分調五苓散二錢服以知為度治頭中寒濕發黄疸𤓰蒂散𤓰蒂二七箇赤小豆秫米各二七粒右細末如大豆一枚納鼻中縮令入當出黄水慎不可吹入庚戌年避地維揚界有一家病傷寒七八日身體洞黃鼻目皆病兩髀及項頭腰脊強急大便澁小便如金予曰脈𦂳且數脾元受濕暑熱藴蓄於太陽之經宿榖相搏鬱蒸而不得散故使頭靣有汗至頸以下無之若鼻中氣冷寸口近掌無脈則不療急用茵陳湯調調五苓散與之數服差又記一家病身體痛靣黃喘滿頭痛自能飲食大小便如常予診之脈大而虚鼻塞且煩予曰非濕熱宿榖相摶此乃頭中寒濕茵陳五苓不可行也仲景云濕家病身疼痛發熱而黃而喘頭痛鼻塞而煩其脈大能自飲食中和無病病在頭中寒濕故鼻塞納藥鼻中則愈仲景旡藥方此方見外臺刪繁證云治天行熱蓋通貫臟腑沉鼔骨髓之間或為黃疸宜𤓰蒂散蓋此方也又記一舟稍病傷寒發黃鼻中酸痛身與目如金小便赤而數大便如經或者欲行茵陳五苓予曰非其治也小便和大便如常知病不在臟腑今眼睛疼鼻頞痛是病在清道中清道者華蓋肺之經也若下大黃則必腹脹為逆亦用𤓰蒂散先食水次搐鼻中黃水盡乃愈類證普濟本事方卷八
