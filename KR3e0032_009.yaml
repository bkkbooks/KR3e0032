body:
  text: 類證普濟本事方卷九宋許叔微撰傷寒治結胸發熱灸法巴豆十四枚黃連七寸連皮用右搗細津和成膏填入臍心艾灸其上不拘壯數腹中有聲病去為度灸了便以温湯浸手帕拭之恐生瘡也治傷寒發狂或棄奔走踰墻上屋鵲石散黃連寒水石各等分右細末每服二錢濃煎甘草湯放冷調服桂枝蔴黃各半湯在前常記一親戚病傷寒身熱頭疼無汗大便不通巳四五日予訊問之見毉者治大黃樸硝等欲下之予曰子姑少待予為視之脈浮緩卧宻室中自稱其惡風予曰表證如此雖大便不通數日腹亦不脹别無所苦何遽便下大抵仲景法須表證罷方可下不爾邪乘虚而入不為結胸必為熱痢也予作桂枝麻黃各半湯繼之以小柴胡褻褻汗出大便亦通而解仲景云凡傷寒之病多從風寒得之始表中風寒之裏則不消矣擬欲攻之當先解表乃可下之若表已解而内不消大滿大堅實有燥屎自可徐下之雖四五日不能為禍也若不宜下而便攻之内虚熱入脇熱遂利煩燥之變不可勝數輕者困篤重者必死矣原本正文重疊難曉予刪正此叚其理甚明大抵風寒入裏不消必有燥屎或大便堅秘須是脈不浮不惡風表證罷乃可下大便不通雖四五日不能為害若不顧表而便下遂為脇熱痢也治閼血抵黨圓水蛭五枚炙蝱䖝去翅足五枚炒桃仁六枚大黃三分去皮右為末煉蜜和作一圓以水一盞煎至七分頓服睟時當下血不下再作之有人病傷寒七八日脈微而沉身黃發狂小腹脹滿臍下冷小便利予曰仲景云太陽病身黃脈沉結小腹硬小便不利者為無血也小便自利其人如狂者血證諦也投以抵黨圓下黒血數升狂止得汗解經云血在上則忘在下則狂大腸膀胱隨經而畜於膀胱故臍下膨脹由閼門滲入大腸若大便黒者此其證也破隂丹方在前有人初得病四肢逆冷臍下築痛身疼如被杖蓋隂證也急服破隂金液來復等丹其脈遂沉而滑沉者隂也滑者陽也病雖隂而見陽脈有可生之理仲景所謂隂病見陽脈者生也仍灸氣海丹田百壯手足温陽回得汗而解或問滑浮之狀如何便有生理予曰仲景云翕奄沉名曰何謂也沉為純隂翕為正陽隂陽和合故名曰滑古人論滑脈雖云徃來前却流利庶轉替替然與數相似仲景三語而足也此三字極難曉翕合也言張而復合也故曰翕為正陽沉言忽降而下也故曰沉為正隂方翕而合俄降而下奄謂奄忽之間仲景論滑脈可謂諦當矣然其言皆有法故讀書難曉治傷寒汗後脾胃傷冷物胸膈不快尋常血氣不和宜補脾湯人參乾薑白术甘草陳桔皮去白青桔皮去白各等分右細末每服三錢水一盞煎數沸熱服入鹽㸃亦得又記有人患傷寒得汗數日忽身熱自汗脈弦數心不得寕真勞復也予診曰勞心之所致神之所舍未復其初而又勞傷其神榮衛失度當補其子益其脾解發其勞庶幾得愈授以補脾湯佐以小柴胡得解或者難曰虚則補其母今補其子何也予曰子不知虚勞之異乎難經曰虚則補其母實則瀉其子此虚當補其母人所共知也千金曰心勞甚者補脾氣以益之脾王則感於心矣此勞則當補其子人所未聞也蓋母生我者也子繼我而助我者也方治其虚則補其生我者與錦囊所謂本骸得氣遺體受䕃同義方治其勞則補其助我者與荀子所謂未有子富而父貧同義此治虚與勞所以異也治中暍白虎湯方在本論中有人頭疼身熱心煩燥渴診其脈大而虚予授以白虎湯數服愈仲景云脉虚身熱得之傷暑又云其脈弦細芤遲何也素問云寒傷形熱傷氣蓋傷氣不傷形則氣消而脈虚弱所謂弦細芤遲者皆虚脈也仲景以弦為隂朱肱亦云仲景脈微弱則皆虚脈可知麻黃湯方在前有人病傷寒身熱頭痛予診之曰邪在表此表實證也當汗之以麻黃湯或人問曰傷寒大抵因虚故邪得以入之今邪在表何以云表實也予曰古人稱邪之所凑其氣必虚畱而不去其病則實蓋邪之入人也始因虚及邪居中則反為實矣大抵調治傷寒先要明表裏虚實能明此四字則仲景三百九十七法可坐而定也何以言之有表實有表虚有裏實有裏虚有表裏俱實有表裏俱虚予於表裏虚實歌中常論其事矣仲景麻黃湯之類為表實而設也桂枝湯之類為表虚而設也若裏實則承氣之類是也裏虚則四逆之類是也表裏俱實所謂陽盛隂虚下之則愈也表裏俱虚所謂陽虚隂盛汗之則愈也常讀華佗傳有府吏倪尋李延共止俱頭痛身熱所苦正同佗曰尋當下之延當發汗或難其異佗曰尋外實延内實故治之異小柴胡湯柴胡二兩黃芩人參甘草各三分半夏六錢一字洗七次右粗末每服五錢水一盞半生薑五片棗二枚同煎至八分去滓温日三服加減法活人書所載甚詳記有人患傷寒五六日頭汗自出頭以下無汗手足冷心下痞悶大便秘結或者見四肢冷又汗出滿悶以為隂證予診其脈汎而𦂳予曰此證誠可疑然大便結非虚結也安得為隂脈雖沉𦂳為少隂證多是自利未有秘結者予謂此正半在表半在裏投以小柴胡得愈仲景稱傷寒五六日頭汗出微惡寒手足冷心下滿口不欲食大便硬脈細者此為陽微結必有表復有裏脈沉亦在裏也汗出為陽微假令純隂結不得復有外症悉入在裏此為半在外半在裏也脈雖沉𦂳不得為少隂所以然者隂不得有汗今頭汗出故知非少隂也可與小柴胡湯設不了了者得屎而解此疾症候同故得屎而解也有人難曰仲景云病人脈隂陽俱𦂳反汗者正陽也此屬少隂今云隂不得有汗何也今頭汗出者故知非少隂何以頭汗出便知非少隂症予曰此一叚正是仲景議論處意謂四肢冷脈沉𦂳腹滿全似少隂然大便硬頭汗出不得為少隂蓋頭者三陽同聚若三隂止胸而還有頭汗出自是陽虚故曰汗出為陽微是隂不得有汗也若少隂頭有汗則死矣故仲景平脈法云心者火也名少隂其頭無汗者可治有汗者死心為手少隂腎為足少隂相與為上下惟以意逆者斯可得之治太陽陽明合病麻黃湯方在前有人病傷寒脈浮而長喘而胸滿身熱頭痛腰脊強鼻乾不得眠予曰太陽陽明今病症仲景法中有三證下利者葛根湯不下利嘔逆者加半夏喘而胸滿者麻黃湯也治以麻黃得解有人問傷寒傳入之序自太陽陽明少陽太隂少隂厥隂所傳有次第何哉予曰仲景本論無說古今亦無言者惟龎安常謂陽主生故太陽水傳足陽明土土傳足少隂木為微邪隂主殺故足少陽木傳足太隂土土傳足少隂水水傳足厥隂木為賊邪予以為不然足少隂水傳厥隂木安得為賊邪蓋牽張傳㑹失之穿鑿何不觀素問隂陽離合論云太陽根起於至隂名曰隂中之陽陽明根起於厲兊名曰隂中之陽少陽根起於竅隂名曰隂中之少陽太陽根起於隂白名曰隂中之太隂少隂根起於湧泉名曰隂中之少隂厥隂根起於大敦名曰隂中之絶隂故其次序正與此合大抵傷寒始因中風寒得之於隂是以止傳足經者皆隂中之陽隂中之隂也不特此也以六氣在天者考之厥隂為初之氣少隂為二之氣太隂為三之氣少陽為四之氣陽明為五之氣太陽為終之氣此順也逆而言之太陽而後陽明陽明而後少陽少陽而後太隂太隂而後少隂少隂而後厥隂傷寒為病逆而非順故以是為序也小承氣湯方具仲景本論有人病傷寒八九日身熱無汗時時譫語時因下利大便不通三日矣非煩非燥非寒非痛終夜不得卧但心中無曉㑹處或時發一聲如嘆息之狀毉者不曉是何症予診之曰此懊憹怫鬱二症俱作也胃中有燥屎承氣湯下燥屎二十餘枚得利而解張仲景云陽明病下之心下懊憹微煩畏中有燥屎者可攻又云病者小便不利大便乍難乍易時有微熱怫鬱不得卧者有燥屎也承氣湯主之素問云胃不和則卧不安此夜所以不得眠也仲景云胃中燥大便堅者必譫語此所以有時發譫語也非燥非煩非寒非痛所謂心中懊憹也聲如嘆息而時發一聲所謂外氣怫鬱也燥屎得除大便通利胃中安和故其痛悉去也又有人病傷寒大便不利日脯發潮熱手循衣縫兩手撮空直視喘急更數毉矣見之皆走予曰此誠惡候得此者十中九死仲景雖有證而無治法但云脈弦者生澀者死今已經吐下難於用藥謾且救之若大便得通而脈弦者庶幾可治也與小承氣湯一服而大便利諸疾漸退脈且微弦半月愈或人問曰下之而脈弦者生此何意也予曰金匱玉函云循衣妄撮怵惕不安微喘直視脈弦者生澁者死微者但發熱譫語承氣湯主之予嘗觀錢仲陽小兒直訣六手循衣領及捻物者肝熱也此症在玉函列於陽明部蓋陽明胃也肝有熱邪淫於胃經故以承氣瀉之且得弦脈則肝平而胃不受尅此所以有生之理讀仲景論不能博通諸毉書以發明其隱奥耑守一書者吾未見其能也又記有人病傷寒下利身熱神昏多困譫語不得眠或者見下利便以譫語為鄭聲為隂虚證予曰此小承氣症衆駭曰下利而服小承氣仲景之法乎予曰此仲景之法也仲景云下利而譫語者有燥屎也屬小承氣湯而得解予嘗讀素問云微者逆之甚者從之逆者正治從者反治從少從多觀其事也帝曰何謂反治岐伯曰寒因寒用通因通用王水注云大熱内結注瀉不止熱宜寒療結復須除以寒下之結散利止則寒因寒用也正合於此治項背強葛根湯葛根一兩麻黄三分桂枝甘草芍藥各半兩右粗末每服五錢水一盞半煎至八分去滓温服覆汗為度有人患傷寒無汗惡風項旣屈而且強予曰項強兀兀葛根湯症或人問曰何謂兀兀予曰兀兀者如兀足疾屈而強也謝復古謂病人羸弱須憑兀而起誤也蓋仲景論中極有難曉處振振欲擗地心中懊憹外氣怫鬱鬱冒不仁膈内拒痛如此之類甚多熈寧中邦守宋迪因其猶子感傷寒之初不能辨其病症見其煩渴而汗多以凉藥解治之至於再三遂成隂毒六日卒乃痛悼之遂著隂毒形症訣三篇始得隂毒隂毒本因腎氣虚寒因慾事或食冷物後傷風内旣伏隂外又感寒或先感外寒而伏内隂内外皆隂則陽氣不守遂頭痛腰重腹痛眼睛疼身體倦怠而不甚熱四肢逆冷額上及手背冷汗不止或多煩渴精神恍惚如有所失二三日間或可起行不甚覺重診之則六脈俱沉細而疾尺部短小寸口或大六脈俱浮大或沉取之大而不甚疾者非隂症也若服凉藥過多則渴轉甚燥轉急有此病症者急服還陽退隂二藥即安惟補氣和氣而已宜服正元散退隂散五勝散隂症不宜發汗如氣正脈大身熱而未差用藥出汗無妨正元散治傷寒如覺傷寒吹著四肢頭目百骨節疼痛急煎此藥服如人行五里再服或連進三服出汗立差若患隂毒傷寒入退陽散半錢同煎或傷冷傷食頭昏氣滿及心腹諸疾服之無有不見效麻黃去節陳皮大黃生甘草乾薑肉桂芍藥附子茱萸半夏洗各等分右麻黃加一半茱萸減一半同為末每服一大錢水一盞生薑三片棗一枚煎至七分熱呷如出汗以衣被蓋覆切須候汗乾去衣被如是隂毒不可用麻黃免更汗出退隂散治隂毒傷寒手足逆冷脈沈細頭痛腰重連進三服小小傷冷每服一字入正元散内同煎入鹽一捻隂毒傷寒欬逆煎一服細細熱呷便止川烏乾薑各等分右為粗末炒令轉色放冷再搗為細末每服一錢水一盞鹽一捻煎半盞去滓温服五勝散治傷寒頭痛壯熱骨節疼痛昏沈困倦欬𠻳鼻塞不思飲食兼治傷寒夾冷氣併慢隂毒神效方白术甘草五味子石膏各四兩乾薑三兩半右為末每服二錢水八分入鹽少許同煎至六分通口服如冷氣相夾入薑棗煎或治隂毒病入艾少許同煎隂毒漸深候積隂感於下則微陽消於上故其候沈重四肢逆冷腹痛轉甚或咽喉不利或心下脹滿結硬燥渴虚汗不止或時狂言指甲白色青黒六脈沈細而一應七至以來有此症者速宜於氣海或開元二穴灸三二百壯以手足和煖為效仍服金液丹來甦丹玉女散還陽散退隂散玉女散治隂毒氣攻上腹痛四肢逆冷惡候並治之川烏去皮臍冷水浸七日後薄切曝乾紙袋盛有患者取碾末一大錢入鹽一小錢水一盞半煎至七分通口服壓下隂毒所注如猪血相似未己良久再進一服還陽散治隂毒靣色青四肢逆冷心燥腹痛用硫黃末新汲水調下二錢良久或寒一起或熱一起更㸔𦂳慢再服汗出差隂毒沈困候沈困之候與前漸深之候皆同而更加困重六脈附骨取之方有按之即無一息八至巳上或不可數也至此則藥餌難為工矣但於臍中灼艾如半棗大三百壯以來手足不和緩者不可治也偶復和緩則以前硫黃及熱藥助之若隂氣散陽氣來即漸減熱藥而和治之以取差也辨少隂脈𦂳止記有人患傷寒六七日心煩昏睡多吐小便白色自汗予診之寸口尺中俱𦂳予曰寒中少隂之絶是以脈𦂳仲景云病人脈𦂳而汗出者亡陽也屬少隂法當咽痛而復下利蓋謂此也有難之曰脈訣𦂳脈屬七表仲景以𦂳脈屬少隂𦂳脈屬陽耶屬隂耶予曰仲景云寸口脈俱𦂳者清邪中於上焦濁邪中於下焦又云隂陽俱𦂳者口中氣出唇口乾燥倦卧足冷鼻中涕出舌上滑胎忽忘治也又云𦂳則為寒又云諸𦂳為寒又云曽為人所難𦂳脈從何而來師云假令已汗若吐以肺裏寒故令脈𦂳假令咳者坐飲冷水故令脈𦂳假令下利以胃虚故令脈𦂳又云寸口脈微尺脈𦂳其人虚損多汗由是觀之則是寒邪之氣入人經絡所致皆虚寒之脈也其在陽經則浮而𦂳在隂經則沈而𦂳故仲景云浮𦂳者名為傷寒又曰陽明脈浮而𦂳者必潮熱此在陽則浮而𦂳也在隂則沈而𦂳故仲景云寸口脈微尺脈𦂳其人虚損多汗則隂常在絶不見陽又云少隂脈𦂳至七八日自下利脈暴微手足反温脈𦂳及去者此欲解也此在隂則沈而𦂳也仲景云浮為在表沈為在裏數為在腑沉為在藏欲知表裏臟腑先以浮沉遲數為定然後兼於脉而别隂陽也故論傷寒當以仲景脈法為准傷寒必本仲景猶兵家之本孫呉塟書之本郭氏三命之本珞琭壬課之本心鏡捨是而之他是猶捨規矩而求方圓捨律吕而合五音必乖謬矣予常作傷寒歌百篇其首篇云傷寒脈證摠論篇第一皆本仲景今録於後浮大數動滑陽脈隂病見阻生可得沈濇弦微弱屬隂陽病見隂終死厄仲景云脈大浮數動滑此名陽也脈沈濇弱弦微此名隂也隂病見陽脈者生陽病見隂脈者死隂陽交互最難明輕重斟量當别白脈須有隂陽須㸔輕重以分表裏在下文輕手脈浮為在表表實浮而兼有力但浮無力表中虚自汗惡風常淅淅傷寒先要辨表裏虚實此四者為急仲景浮為在表沈為在裏然表正有虚有實浮而有實者表實也故無汗不惡風浮而無力者表虚也故自汗惡風重手脈沈為在裏裏實脈沈來亦實重手無力大而虚此是裏虚裏審的裏正亦有虚實脈沈而有力者裏實也故腹滿大便不通沈而無力者裡虚也或泄利或隂症之類此八句辨表裏虚實盡矣風則虚浮寒堅牢水停水畜必沈潛動則為病數為熱友飲應須脈急弦太過之脈為可輕不及之脈亦如然仲景云風則虚浮寒則牢堅沈潛水人友飲急弦動則為痛數則熱煩太過可怪不及亦然邪不空見中心有奸榮衛太盛名髙章髙章相摶名曰網榮衛微時名卑惵卑惵相摶損名揚榮衛既和名緩遲緩遲名沈此最良九種脈中辨疾正長沙之脈妙難量仲景云寸口微氣盛名曰髙榮氣盛名曰章髙章相摶名曰網衛氣弱名曰惵榮氣弱名曰卑惵卑相摶名曰損衛氣和名曰緩榮氣和名曰遲緩遲相摶名曰沈大抵仲景論傷寒症候自是一家瞥瞥有如羮上肥此脈定知陽氣微縈縈來者蛛絲細却是體中隂氣衰脈如瀉漆之絶者病人亡血更何疑仲景云瞥瞥如羮上肥者陽氣微也脈縈縈如蛛絲細者陽氣衰也脈綿綿如瀉漆之絶者亡血也陽氣衰千金竹隂氣陽結藹藹如車蓋隂結循竿亦象之仲景云藹藹如車蓋者陽結也如循竿者隂結也陽盛則促來一止隂盛則結緩而遲此謂促難一脈也仲景云脈來緩時一止名曰結脈來數時一止名曰促脈陽盛則促隂盛則結縱橫逆順宜審察殘賊灾怪須要知仲景云脈有相乘有縱有橫有逆有順何謂也曰水行乘火金行乘木名曰縱火行乘水木行乘金名曰橫水行乘金火行乘木名曰逆金行乘水木行乘火名曰順也又問曰脈有殘賊何謂也師曰脈有弦𦂳浮滑沈濇名殘賊能為諸脈作病也又問曰脈有灾怪何謂也答曰舊時服藥今乃發為灾怪脈靜人病内虚故人安脈病曰行尸仲景曰脈病人不病曰行尸以無主氣卒仆不知人病脈不病名曰内虚以無榖神雖困無苦右手氣口當主氣主血人迎左其位氣口𦂳盛食必傷人迎𦂳盛風邪熾左為人迎右為氣口人迎𦂳盛傷於風氣口𦂳盛傷於食數為在腑遲為臟浮為在表沈為裏仲景云浮為在表沈為在裏數為在腑遲為在臟脈浮而緩風傷榮浮𦂳堅澁寒傷衛脈微大忌令人吐欲下猶防虚且細仲景云脈微不可吐虚細不可下沈微氣弱汗為難三者要須當審記孫用和云隂虚脈沈微而氣弱者不可汗汗下吐三候脈有不可行者當審之陽加於隂有汗在左手沈微却應未素問云陽加於隂為之汗陽胃脈定死生仲景云陽脈者凡十有一太谿腎脈為根蒂傷寒必診太谿陽者謂人以腎脈胃脈為主仲景譏世人握手不及足者死脈來六至或七至邪氣漸深須用意浮大晝加病屬陽沈細夜加分隂位九至來短促以上狀若湧泉無入氣更加懸絶漸無根命絶天真當死矣孫用和云脈至六至七至以上浮大晝加病更及八至精神消神氣亂必有散脱精神之候須忌急為治療又加之九至十至雖和扁亦難治如八至九至加以懸絶治者無根也如泉之湧脈無入氣天真絶必死也病人三部脈調勻大小浮沈遲速類此是隂陽氣已和勿藥自然應有喜仲景云寸口闗上尺中三處大小浮沈遲速同等雖有寒熱不解此脈已和為必愈發熱惡寒近似傷寒者有五種脈浮而數其人發熱而惡寒者傷寒之候也脈浮而𦂳其人發熱惡寒或有痛處是欲為癰癤也脈浮按之反澁其人發熱惡寒或膈實而嘔吐此是傷食也脈浮而滑其人發熱而背寒或頭眩而嘔吐此是風痰之症也脈浮而弦其人發熱而惡寒或思凡食此是欲作瘧疾也能辨其脈又驗其證斯無誤也類證普濟本事方卷九
