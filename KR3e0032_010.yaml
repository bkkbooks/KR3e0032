body:
  text: 類證普濟本事方卷十宋許叔微撰治婦人諸疾治婦人榮衛氣虛挾風冷胸脅膨脹腹中㽱痛經水愆期或多或少崩傷漏下腰腿痛重靣色青黃嗜卧無力安胎止痛補虛益血四物湯當歸熟地黃白芍藥芎藭各等分右粗末每服四錢水一盞煎八分去滓溫服不以時候滑胎枳殼散商州枳殼二兩甘草一兩右細末每服二錢百沸湯點服空心食前日三服凡懷孕六七月以上即服令兒易生初生胎小微黑百日以後肉漸變白此雖孫真人滑胎易生方然抑陽降氣為衆方之冠治妊娠衝任脈虛補血安胎內補圎熟地黃二兩當歸一兩微炒右細末煉蜜和丸如梧子大每服三四十丸溫酒下上三方諸集皆載之在人用之如何耳大率婦人妊娠惟在抑陽助隂素問云隂博陽别為有子之兆關前為陽關後為隂尺中之脈按之博手不絶者妊子也婦人平居陽氣微盛無害及其妊子則方閉經隧以養胎若陽盛博之經脈妄行胎乃不固素問所謂隂虛陽博謂之崩也抑陽助隂之方甚多然胎前藥惟惡羣隊若隂陽交雜别生他病惟是枳殼散所以抑陽四物湯所以助隂故耳枳殼散差寒若單服之恐有胎寒腹痛之疾以內補丸佐之則陽不至強隂不至弱隂陽調勻有益胎嗣此前人未嘗論及治婦人有孕傷食木香圓木香二錢京三稜白茯苓人參各三錢右細末麵糊丸菉豆大每服三十丸熟水下治妊娠氣不和調飲食白术散白术炒乾紫蘇各一兩白芷微炒三錢人參三錢川芎訶子皮青皮各半兩甘草一錢右細末每服二錢水一盞薑三片煎七分不據時候溫服經云飲食自倍腸胃乃傷又云隂之所生過在五味隂之五宫傷在五味若妊子飲食不節生冷毒物恣性食噉致脾胃之疾故妊娠傷食難得藥惟此二方穩捷治妊娠胎氣不和懷胎近上脹滿疼痛謂之子懸兼治臨産驚恐氣結連日不下紫蘇飲紫蘇莖葉一兩大腹皮人參川芎陳桔皮白芍藥各半兩當歸三錢甘草一分右細銼分作三服每服用水一盞半生薑四片蔥白七寸煎至七分去滓空心服曽有婦人纍日産不下服遍催生藥不驗豫曰此必坐草太早心懷下一懼氣結而然非胎不順也素問云恐則氣下蓋恐則精却却則上焦閉閉則氣還還則下焦脹氣乃不行矣得此藥一服便産及婦人六七月子懸者豫用此數數有驗不十服胎便近下下死胎方桂末二錢麝香當門子一個同研溫酒服須臾如手推下比之用水銀等此藥不損血氣趙和叔傳治婦人病多是月經乍多乍少或前或後時發疼痛醫者一例呼為經病不曽説是隂勝陽是陽勝隂所以服是藥少得有效蓋隂氣乘陽則胞寒氣冷血不運行經所謂天寒地凍水凝成氷故令乍少而在月後若陽氣乘隂則血流散溢經所謂天暑地熱經水沸溢故令多而在月前當知其隂陽調其血氣使不相乘以平為福紫石英圓紫石英禹餘糧燒醉淬人參龍骨川烏頭炮桂心桑寄生杜仲五味子逺志澤㵼當歸石斛蓯蓉乾薑各一兩川椒牡礪甘草各半兩右為末煉蜜丸如梧子大飲下三十丸至五十丸空心食前服治婦人室女月候不通疼痛或成血瘕通經圓桂心青皮去皮大黃炮乾薑川椒蓬莪术川烏乾漆當歸桃仁各等分右細末將四錢用米醋􅘮成膏和餘六錢末成劑臼中治之圓如桐子大曬乾每服二十丸用淡醋湯下加至三十圓溫酒亦得空心食前服徽州靈巫張擴頃年緣事在推勘院有王醫者以醫職直宿日夜與之稔熟口傳此方渠甚祕之豫後得此方治婦人疾不可勝數且欲廣行不敢自祕尋常血氣凝滯疼痛數服便效有一師尼患惡風體倦乍寒乍熱靣赤心煩或時自汗是時疫氣大行醫見其寒熱作傷寒治之大小柴胡湯雜進數日病劇豫診視曰三部無寒邪脈但厥脈弦長而上魚際宜服抑隂等藥豫製此地黃圓生地黃二兩柴胡秦芄黃芩各半兩赤芍藥一兩右細末煉蜜丸如桐子大每服三十丸烏梅湯吞下不據時候日三服昔宋禇澄療師尼寡婦别製方蓋有謂也此二種鰥居獨隂無陽欲心萌而多不遂是以隂陽交爭乍寒乍熱全類溫瘧久則為勞常讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆醫皆以為寒熱也倉公曰病得之欲男子不可得也何以知欲男子而不可得診其脈肝脈弦出寸口是以知之蓋男子以精為主婦人以血為主男子精盛則思室婦人血盛則懷胎無肝攝血有也厥陽弦出寸口又上魚際則隂血盛可知故知禇澄之言信有謂矣治婦人月經不調每行數日不止兼有白帶漸漸瘦悴飲食少味纍年無子地黃圓熟地黃一兩山茱茰白蕪荑乾薑白芍藥代赭石醋淬各一兩厚朴白僵蠶各一兩右細末煉蜜丸如梧子大每服四五十丸空心酒下日三服此龎老方婦人有白帶是第一等病令人不産有宜速治之此扁鵲過邯鄲聞貴婦人帶下所以專為醫也治婦人月經壅滯每發心腹臍疞痛不可忍及治産後惡露不快血上愴心迷悶不省氣絶欲死琥珀散荆三稜蓬莪术赤芍藥劉寄奴牡丹皮官桂熟地黃菊花真蒲黃當歸乾稱以上各一兩銼右前五味用烏豆一升生薑半斤切片米醋四升同煮豆爛為度焙乾入後五味同為末每服二錢溫酒調下空心食前服一方不用菊花蒲黃用烏藥玄胡索亦佳豫家之祕方也若是尋常血氣病只一服産後血衝心二服便下常服尤佳豫前後救人急切不少此藥易合宜多合以救人治婦人血瘕血積經候不通桃仁圓桃仁去皮尖麩炒黃大黃川朴硝各一兩虻蟲半兩炒黑右四味末之以醇醋二升半銀石器中熳火煎取一升五合下大黃桃仁虻蟲等不住手攪千下後下朴硝更不住手攪良久出之丸如梧子大前一日不用喫晚食五更初用溫酒吞下五圓日午取下如赤豆汗雞肝蝦麻如未下再作血解紅即止續以調氣血藥補之此出千金方頃年在毗陵有一貴人妻患小便不通臍腹脹不可忍衆醫皆作淋治如八正散之類數種治皆不退痛愈甚豫診之曰此血瘕也非瞑眩藥不可去豫用此藥更初後至日午痛大作不可忍遂卧少頃下血塊如拳者數枚小便如黑汁者一二升痛止得愈此藥治病的切然猛烈太峻氣虛血弱者更斟酌與之治婦人妊孕六七月因事築磕著胎或子死腹中惡露下疼痛不巳口噤欲絶用此藥探之若不損則痛止子母俱安若胎損立便下此藥催生神效佛手散川芎當歸各等分右粗末每服三錢水一小盞煎令泣泣欲乾投酒一大盞止一沸去滓溫服口噤灌之如人行五七里再進不過三二服便生有一方云此藥治傷胎去血多崩中去血多金瘡去血多拔齒去血多昏暈欲倒者去水煎服治崩中下血方黃芩為細末每服一錢燒稱鎚酒調下崩中藥多是用止血及補血藥此治陽乘隂前所謂天暑地熱經水沸溢者治下血不止或成五色崩漏方香附子樁去皮毛中斷之略炒為末每服二錢用清米飲調下此方徐朝奉傳其內人有是疾服遍藥不效後獲此方遂愈須久服為佳亦治産後腹痛大是婦人仙藥常服益血調氣治産後中風口噤牙關緊急手足瘈瘲愈風散荆芥穗輕焙過一兩細末每服二錢溫酒調下經驗産室皆有之陳選方中用舉卿古拜二味蓋切腳隱語以祕之也此藥委有竒效神聖之功大抵産室但無風為佳不可衣被帳褥太暖太暖即出汗出汗則腠理開易於中風便昏冒記有一婦人産後遮護太蜜閣內更生火睡久及醒則昏昏如醉不省人事其家驚惶醫用此藥佐以交加散祝云服之必睡睡中必以左手搔頭覺必醒矣果如其言交加散治婦人榮衛不通經脈不調腹中撮痛氣多血少結聚為瘕産後中風生地黃五兩研取汁生薑五兩研取汁右交互用汁浸一夕各炒黃漬汁盡為度末之尋常腹痛酒調下三錢産後尤不可缺治婦人諸般淋苦杖根俗呼為杜牛膝多取淨洗碎之以一合用水五盞煎一盞去滓用麝香乳香少許研調下鄞縣武尉耿夢得其內人患砂石淋者十三年矣每溲痛楚不可忍溺器中小便下砂石剝剝有聲百方不效偶有此方啜之一夕而愈目所見也半夏散半夏末如豆大許竹管吹入鼻中立醒治産後出血太多虛煩發渴蒲黃散真蒲黃末二錢飲下渴燥甚新汲水下治妊娠時氣身太熱令子不落護胎方伏龍肝為末水調塗臍下二寸乾則易差即止又取井中泥塗心下乾則易又方浮萍乾川朴硝蛤粉大黃碎微炒藍根各一兩右為末水調封臍上安胎解煩熱極妙婦人患頭風者十居其半每發必掉眩如在車上蓋因血虛肝有風邪襲之耳素問云徇豪招搖目眩耳聾上虛下實過在足少陽厥隂甚則歸肝蓋此謂也豫常處此方以授人比他藥捷而效速芎藭散川芎一兩當歸三錢羌活旋覆花蔓荆子細辛華隂者石膏藁本荆芥穗半夏麯炒防風熟地黃甘草各半兩右為末每服一錢水一大盞薑三片同煎至七分去滓溫服不拘時婦人産後有三種疾鬱冒則多汗汗則大便祕故難於用藥惟麻子蘇子粥最佳則穩紫蘇子大麻子二味各半合淨洗研極細用水再研取汁一盞分二次煮粥啜之不惟産後可服大抵老人諸虛人風祕皆得力常有一貴人母年八十四忽然腹滿頭疼惡心不下食占醫者數人議皆拱補脾進食治風清利頭目藥數日病愈甚全不進食其家憂懇豫辨之豫説之曰藥皆誤矣此症止是老人風祕臟腑壅滯聚於膈中則腹脹惡心不喜食又上至於巔則頭痛神不清也若得臟腑流暢諸疾悉去矣豫令作此粥兩啜而氣泄先下結屎如胡椒者十餘後漸得通利不用藥而自愈治婦人天癸以過期經脈不勻或三四月不行或一月再至腰腹疼痛素問云十損七益謂女子十七數盡而經脈不依時者血有餘也不可止之但令依時不腰痛為喜當歸散當歸川芎白芍藥黃芩各銼炒各一兩白术半兩山茱萸兩半右細末每服二錢酒下空心日三服冷去黃芩加桂一兩治婦人臟燥大棗湯甘草三兩小麥一升大棗十枚右㕮咀以水六升煮三升去滓溫分三服亦補脾氣鄉里有一婦人數次無故悲泣不止或謂之有祟祈禳請禱偹至終不應豫忽憶金匱有一證云婦人臟燥悲傷欲哭象如神虛數次者大棗湯豫急令治藥盡劑而愈古方識病製方種種妙絶如此試而後知治妊娠熱病胎死腹中鹿屑湯鹿角屑一兩水一碗蔥白五莖豆豉半合煎六分溫二服治婦人生産數日不下及胞衣死胎不下者方用萆麻七粒去殼研如泥塗足心才下急洗洗去此崔元亮海上方人但未知耳政和中一鄉人內子産二日不下豫令漫試之一塗俄頃便下自後常用極驗小兒病方候小兒脈當以大指按三部一息六七至為平和十至為發熱五至為內脹脈緊為風癎沉緩為傷食促急為虛驚弦急為氣不和沈細為冷浮為風大小不勻為惡候為鬼祟浮大數為風為熱伏結為物聚單細為疳勞凡腹痛多喘嘔而脈洪者為有蟲浮而遲潮熱者胃表也溫之則愈豫嘗作歌以紀之歌曰小兒脈緊風癎候沈緩食傷多吐嘔咬急因知氣不和急促虛驚神不守冷則沈細風則浮半實大便應祕久腹痛之候緊而弦脈亂不治安可救變蒸之時脈必變不治自然無過繆單細疳勞洪有蟲大小不勻為惡候脈浮而遲有潮熱此必胃寒來內冦瀉痢浮大不可醫仔細斟量宜審究嬰孩未可脈方者俗醫多看虎口中紋顔色與四肢冷熱驗之亦有可取豫又以二歌紀之虎口色歌曰紫色紅傷寒青驚白色疳黑時因中惡黃即困脾端冷熱症歌曰鼻冷定知是瘡疹耳冷應知風濕症通身皆熱是傷寒上熱下冷傷食病若能以色脈參互驗之所得亦過半矣治小兒一切驚疳食稍風癎之症睡驚圓史君子五十箇燒存性香墨棗大一塊金銀箔各五片右先研史君子墨細次入金銀箔乳鉢內同研次入膩粉併麝香少許研令極細勻稀糊丸如梧子大隂乾每服一丸薄荷湯磨下一嵗以下半丸一名青金丹鄉里一士人家貨此藥日得數十錢已百餘年矣治小兒嘔吐脈數有熱麥門冬散麥門冬半夏麯人參茯苓各二錢甘草一錢右細末每服二錢水一盞薑三片煎五分日二三服治小兒嘔吐脈遲細有寒白术散白术人參各三錢半夏麯二錢茯苓乾薑甘草各一錢右每服二錢水一盞薑三片棗一枚煎七分日二三服治小兒久傷脾胃腹脹調中圓乾薑橘紅白术茯苓木香縮砂仁官桂良薑各等分闕惟慢脾風因吐瀉脾胃受風為難治難得藥近世多用生附子及青州白圓子金液丹合用之如醒脾丸皆要藥也治小兒慢脾風因吐利後虛因昏睡欲生風癎醒脾圓厚朴白术船上硫黃天麻各半兩全蝎防風人參官桂各一分右為末酒浸蒸餅和丸如雞頭大每服一丸槌研溫米飲下又方全蝎二箇青薄荷葉包煨白术指靣大二塊麻黃長五寸十箇去節右細末二嵗以下一字三嵗以上半錢薄荷湯下量大小加減服治脾風多困人參散人參冬瓜仁冬半兩天南星一兩切片用奬水薑汁煮存性右細末每服一錢水半盞煎二三分溫服治小兒胎虛氣弱吐利生風昏困嗜卧或潮搐蝎稍圓全蝎微炒白附子煨裂各半兩通明硫黃一兩半夏一兩切片薑汁製炮乾右為末薑汁糊丸如麻子大每服三十粒荆芥湯下更看大小加減法治小兒拗哭龍腦散龍腦蟬殼鈎藤有鈎子者羌活茯苓人參各等分右為末每服一大錢水一大盞煎六分去滓熱服類證普濟本事方卷十
