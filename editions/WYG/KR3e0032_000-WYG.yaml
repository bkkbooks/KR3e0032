body:
  text: 類證普濟本事方醫家類提要臣等謹案類證普濟本事方十卷宋許叔㣲撰叔㣲字知可或曰揚州人或曰毘陵人惟曽敏行獨醒雜志作真州人二人同時當不誤也登紹興二年張九成榜進士第六人醫家謂之許學士宋代詞臣率以學士為通稱不知所厯何官也是書載經騐諸方兼記醫案故以本事為名朱國禎湧幢小品載叔㣲嘗獲鄉薦春闈不利而歸舟次平望夢白衣人勸學醫遂得盧扁之妙凡有病者診後與藥不取其直晚嵗取平生已試之方併記其事實以為本事方取本事詩之例以名之云云即指此書然考獨醒雜志叔㣲雖有夢見神人事而學醫則在其前不知國禎此語何本也叔微診治之術最為精詣其所論廣絡原野以冀一獲之説尤救弊之篤論其書屬詞簡雅不諧於俗故明以來不甚傳布此本從宋槧鈔出其中凡丸字皆作圓猶是漢張機傷寒論金匱要畧舊例也國禎又記叔微所著尚有擬傷寒歌三卷凡百篇又有治法八十一篇及仲景脉法三十六圖翼傷寒論二篇辨類五卷今皆未見傳本疑已散佚云乾隆四十四年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:653010c65f1a9bf869474fd232cc27aae50e889356b5ccf28364c7443f48c6e1
