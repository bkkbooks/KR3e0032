body:
  text: 類證普濟本事方卷六宋許叔微撰諸𠻳虚汗消渴治𠻳杏酥飲杏仁欵冬花前胡半夏製五味子麻黄柴胡桑白皮人參桔梗各等分右細末每服三錢水一盞半薑五片同煎七分通口服戢陽氣止盜汗進飲食退經絡熱柏子仁丸新柏子仁研半夏麯各二兩牡礪甘弱子内火煆用醋淬七次焙乾人參麻黄根漫火炙拭去汗吳白术五味子各一兩净麩半兩火炒右為末棗肉丸如梧子大空心米飲下三五十丸日服得效減一服好愈即住作散調亦可治虚勞盜汗不止牡礪散牡礪煅麻黄根黄蓍各等分右細末每服二錢水一盞煎至七分温服治風虚多汗惡風防風湯防風五分澤㵼牡礪炒桂枝各三分右細末每服二錢食後酒調下又方白术防風各一兩牡礪三分炒如粉右細末酒調二錢服惡風加防風一倍氣加术靣腫加牡礪治消渴方浮石船上青黛各等分麝香少許右細末每服一錢温湯調下治渴疾飲水不止神效散白浮石蛤粉蟬殻各等分右細末用鯽魚膽七箇調三錢服不拘時候神效古方驗録論消渴有三種一者渴而飲水多小便數脂似麩片甜者消渴病也二者喫食多不甚渴小便少似有油而數者消中病也三者渴飲水不能多便腿腫脚先瘦小隂痿弱小便數此腎消病也特忌房勞千金云消渴病所慎者有三一飲酒二房勞三鹹食及麵能慎此湏不服藥亦自可消渴之人愈與未愈常須慮患大癰必於骨節間忽發癰疽而卒予親見友人邵任道患渴數年果以癰疽而死唐祠部李郎中論消渇者腎虚所致每發則小便甜毉者多不知其疾故古今亦缺而不言洪範言稼穡作甘以物理推之淋餳醋酒作脯法須臾即皆能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛則上蒸精氣氣則下入骨髓其次以為脂膏其次以為血肉也其餘則為小便故小便色黃血之餘也騷氣者五臟之氣鹹潤者則下味也腰腎旣虚冷則不能蒸於榖氣則盡下為小便故味甘不變其色清冷則肌膚枯槁也由如乳母榖氣上泄皆為乳汁消渴病者下泄為小便皆精氣不實於内則小便數瘦弱也又肺為五臟華蓋若下有煖氣蒸則肺潤若下冷極則陽氣不能升故肺乾則渴易於否卦乾上坤下陽無隂而不降隂無陽而不升上下不交故成否也譬如釡中有水以火煖之其釡若以板覆之則煖氣上騰故板能潤也若無火力水氣則不能上此板終不得潤也火力者則是腰腎強盛也常須煖補腎氣飲食得火力則潤上而易消亦免乾渴也故張仲景云宜服腎氣八味圓此疾與脚氣雖同為腎虚所致其脚氣始發於二三月盛於五六月衰於七八月凡消渴始發於七八月盛於十一月十二月衰於二三月其何故也夫脚氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者疾可理也猶如善為政者寛以濟猛猛以濟寛隨事制度爾仲景云足太陽者是膀胱之經也膀胱者腎之府小便數此為氣盛氣盛則消榖大便硬衰則為消渴也男子消渴飲一斗小便亦得一斗宜八味腎氣圓乾地黃半觔山藥四兩茯苓牡丹皮附子桂心各三兩澤㵼四兩山茱萸五兩右細末煉蜜圓如桐子大酒下二三十圓忌猪肉冷水𦍑荑胡荽千金地黃圓亦佳在中部心熱中治消渴三痟圓好黃連去鬚細末不計多少剉冬瓜肉研裂自然汁和成餅子隂乾再為末再用汁浸和如七次即用冬𤓰汁為圓桐子大每服三四十圓以冬𤓰汁煎大麥仁湯送下尋常止一服金瘡癰疽打撲諸瘡破傷風治金瘡止血除隂疼痛辟風續筋骨生肌肉地黄散地黄苗地菘青蒿蒼耳苗生艾汁三合赤芍藥各五兩入水取汁石灰三升右五月五七月七午時以前藥汁拌石灰三升隂乾入黄丹三兩更杵羅細凡有金瘡傷折出血用藥封包不可動著十日差不腫不膿斂金瘡口止疼痛劉寄奴散劉寄奴一味為末摻金瘡口裏劉裕微時伐狄見大蛇長數丈射之明日復至聞杵臼聲見青衣童子搗藥問其故曰我王為劉寄奴所射合藥傅之帝曰何不殺之曰寄奴王者不死帝叱之皆散收藥而返遇金瘡傅之良驗此藥治湯火瘡至妙經驗方云劉寄奴為末先以糯米漿雞翎掃傷著處後摻藥末在上並不痛無痕大凡湯著急用鹽末摻之䕶肉不壊然後藥傅之治從高墮下墜損惡血在骨節間疼痛芸薹散荆芥藕節各二兩隂乾芸薹子川芸消馬齒莧各一兩隂乾右細末用蘇枋本半兩酒一大盞煎七分調下二錢治腕折傷筋損骨疼痛不可忍生地黄一觔切藏𤓰薑糟一觔生薑四兩切右都炒令匀熱以布裹罨傷折處冷則易之曽有人傷折宜用生龜尋捕一龜將殺患人忽夢見龜告言曰勿相害吾有竒方可療於夢中授此方治打撲墜損惡血攻心悶亂疼痛水仙散未展荷葉隂乾一味為末食前以童子熱小便一小盞調下三錢以利下惡物為度一方用大乾荷葉五片燒令烟盡細研作一服如上服之長肉止痛生肌㯽榔散檳榔黄連木香各等分右為末薄貼瘡上神效治打撲傷損及一切癰腫未破令内消方生地黄研如泥木香細末右以地黃膏隨腫大小攤於紙上摻木香末一層又再攤地黃貼腫上不過三五度即愈元祐中宗人許元公納省試卷過興國寺橋值微雨地滑墜馬右臂臼脱路中一人云急與挼入臼中血漬臼中最難治也僕者如其說神已昏已不覺痛也遂僦卧轎舁去至景德須臾親戚集議所毉或云非録事巷田馬騎不能了此疾急鞭馬召至則已日暮矣田秉燭視其靣色云尚可治此疾料理費力先議所酧方敢用藥此公去省試止旬日又是右臂正妨作字今須作兩等商量如旬日内安痊如舊不妨就試作一等價如至期未能就試則減數别作一等價悉如其說遂用藥封其腫黯處云中夜方省達旦巳痛止矣翌日至悉去其封藥損處巳白其閼血青黯已移在臂臼之上矣如是數日易之其腫黯直至肩背於是用藥下之初黒血一二升三五日如舊臂亦不痛遂得赴試可謂妙醫矣元公云若此外方遭此厄微田生吾終作折臂鬼矣故知墮損手足臼脱急須挼入不爾終成蘆節也宣和中有一國醫忽承快行宣押就一佛刹醫内人限目今便行鞭馬至則寂未有人須臾卧轎中扶下一内人又一快行送至奉㫖取軍令状限日下安痊醫診視之巳昏死矣問其從人皆不知病之由惶恐無地矣良乆有二三老内人至下轎環而泣之方得其實云因蹴鞦韆自空而下墜死醫者云打撲傷損自屬外科欲申明又恐後時參差不測再視之微覺有氣忽憶藥篋中有蘇合香圓急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊予謂正當下蘇合香圓蓋從髙墜下必挾驚悸血氣錯亂此藥非特逐閼血而又醒氣毉偶用之遂見功此藥居家不可缺也氣厥鬼邪􅀈􅀈傳屍心痛時疾之類皆治良方載甚詳須自合為佳爾王蘧發背方序云元祐三年夏四月官京師疽發於背召國醫治之逾月勢益甚得徐州蕭縣人張生以艾火加瘡上自旦及暮凡一百五十壯知痛乃已明日鑷去黒茄膿血盡潰膚理皆紅亦不復痛始别以藥附之日一易焉易時旋剪去黒爛惡肉月許瘡乃平是嵗秋夏間京師士大夫病疽者七人予獨生此雖司命事然固有料理不知其方遂至不幸者以人意論之可為慨然於是撰次前後所得良方摸版以施庶幾古人濟衆之意紹聖三年三月日題治諸般癰疽發背柞木散柞木葉四兩乾乾荷葉金嬰根萱草也甘草節地榆各一兩右同剉搗為煮散每服半兩水二碗煎至一碗分兩服早晚各一併滓再煎一服膿血者自乾未成者自消忌飲食毒歛瘡内消方黃明膠一兩水半升消了入黃丹一兩再煮三五沸又放温冷以雞毛掃在瘡口上如未成即塗腫處自消治癰疽上痛拔毒七寳散乾荷葉心當中如錢片不計多少為粗末每用三匙水二碗熳火煎一碗半放温淋洗揩乾以太白膏傅沈遇明一方荷葉一兩藁本半兩為末如前用太白膏寒水石水飛過用臘月猪脂調成膏隨瘡大小用薄紙攤貼之國老膏橫紋甘草一觔擘開搥碎用水一斗浸兩宿夏浸一宿挼細夾絹濾清去滓入銀石器内熳火熬成膏分作三服每發以温酒半升調下量年齒老少分作數服令發背自潰黄蓍散綿黄蓍細者洗焙一兩甘草半兩皂角針揀紅紫者剉麩炒黄一兩右細末每服一大錢酒一盞乳香一塊煎至七分去滓服托裏排膿生犀散皂角針不計多少粗大紫色者右藏瓶中鹽泥固濟炭火燒過存性放冷出碾為細末每服一錢温酒㣲調下暑月用陳米飲下清心内固黄蓍圓綿黄蓍人參各半兩右細末入真生龍腦一錢研細用生藕汁和圓菉豆大每服三十圓温熱水下加至四十圓日三服治一切瘡毒内托散菉豆粉一兩研細通明乳香一分熳火於銀石噐中炒手指攬使乾可撚急傾出在紙上用扇扇冷研令極細用右同研勻凡一切惡瘡應係難名癰腫每用二錢至三錢食後臨卧濃煎甘草湯調下如打撲及諸般肉損用温酒調下食後空心服些小即内消大捐則敗血從大便出矣治發背癰疽方車螯殻一兩箇泥固濟火煆為末苽蔞一枚燈心五十莖蜜一大匙用酒一升煎下三味微熱調末二大錢服不過二服止痛去毒治癰疽已有瘡眼未出膿痛不可忍宜用此藥絍即膿出巴豆一個去皮膜不去心油鹽豉十四個口中含去皮令軟同研爛入真麝少許如難丸入少稀糊揑作餅子或如鼠糞尖或圓子臨時看瘡口絍之口以紙撚子送入藥便不用紙撚子須臾必痛忍之良久膿遂出治發背方草决明生用一升搗碎生甘草一兩亦碎水三升煮取一升温分二服大抵血滯則生瘡肝為宿血之藏而决明和肝氣不損元氣也治破傷風及打撲傷損玉真散天南星湯洗七次防風各等分右細末如破傷以藥敷貼瘡口然後以温酒調下一錢如牙闗𦂳急角弓反張用藥二錢童子小便調下或因鬭傷相打内有傷損之人以藥二錢温湯調下打傷至死但心頭微温以童子小便調下二錢并三服可救二人性命類證普濟本事方卷六
