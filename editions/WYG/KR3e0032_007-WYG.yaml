  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3e0032_WYG_007-1a, image: WYG0741/WYG0741-0430a.png}
body:
  text: 類證普濟本事方卷七宋許叔微撰諸蟲飛尸鬼疰制諸蟲方白蕪荑檳榔各一兩右細末蒸餅丸如桐子大每服十五丸至二十丸温湯下制諸蟲解勞悦澤肌膚去勞熱檳榔一兩半龍膽一兩乾漆半兩右細末煉蜜丸如桐子大每服十丸至十五丸熟水吞下治寸白蟲方黒鉛灰炒四錢一服先喫猪肉脯少許隔一時即用砂糖濃水半盞調灰五更服蟲盡下白粥將息一日良方療寸白用錫沙蕪荑檳榔者極佳予宣和中每覺心中多嘈雜意謂飲作又疑是蟲漫依良方所説服翌日下蟲二條一長二尺五寸頭扁濶尾尖鋭每寸作一節班班如錦紋一條皆寸斷矣千金謂勞則生熱熱則生蟲心蟲曰蛔蜱蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶五蟲皆能殺人惟肺蟲為急肺蟲居肺葉之内蝕人肺系故成瘵疾咯血斷嘶藥所不到治之為難有人説道藏諸蟲皆頭向下行惟自初一至初五以前頭上行故用藥者多取月朏以前蓋謂是也治飛尸者㳺走皮膚穿臓腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脈每發不可得近見尸喪聞哀哭便發風尸者淫濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纒骨結臟衝心脇每發紋切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏發每節氣致變輙成大惡皆宜用此方忍冬葉剉數斛煮濃取汁煎之丸如雞子大一枚日三服太一精神丹蘇合香圓治此第一因喪驚憂悲哀煩惱感尸氣而成諸變動不已似冷似熱風氣觸則發雄朱散雄黃硃砂桔梗𦍑活當歸升麻川烏龍齒犀角芍藥鬼箭炒白僵蠶炒川芎南星炮山梔子陳皮木香白术龍頸骨醋炙紫蘇子莽草枳殻㯽榔二箇黃芩以上各等分麻黃蜈蚣二條酒炙乾蝎炒一分右細末每服二錢酒調下日三服頃在徽城日嘗修合神精丹一料庚申予家一婦人夢中見二蒼頭一在前一在後手中持一物前者云到也後者應云到也擊一下爆然有聲遂魘覺後心一㸃痛不可忍昏悶一時許予忽憶神精丹有此一證取三粒令服之遂至府過㕔少頃歸已無病矣云服藥竟痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中治中風之要藥但近世少得青磁石為難合耳人平居無苦疾忽如死人身不動摇黙黙不知人目閉不能問口啞不能言或㣲知人惡聞人聲但如眩冒移時方寤此由出汗過多血少氣併於血陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通故移時方寤名曰鬱冒亦名血厥婦人多有之宜白薇湯倉公散白薇當歸各一兩人參半兩甘草一分右粗末每服五錢水二盞煎至一盞去滓温服倉公散瓜蒂末藜蘆雄黃礬石炒右各等分細末少許吹入鼻中腹脇疼痛方治男子兩脇疼痛枳實散右細末薑棗湯調下二錢酒亦可食前日三服治脇肋下痛不美食葛根湯葛根半兩桔梗防風枳殻白芍藥甘草訶子川芎白木各一分右粗末每服四錢水盞半薑棗同煎至七分温服日四五治悲哀煩惱傷肝氣至兩脇骨疼筋脈𦂳急腰脚重滯兩股筋急兩脇牽痛四肢不能舉漸至脊膂攣急此藥大治脇痛枳殻散枳殻細辛桔梗防風川芎各四兩葛根甘草二兩右粗末每服四錢水盞半薑三片煎至七分空心温服治脇痛如前兼去手足枯悴薏苡仁圓薏苡仁石斛用細者三分附子半兩牛膝生地黄各三分細辛人參枳殻栢子仁川芎當歸各半兩甘草椒仁各一分右細末煉蜜丸如桐子大每服三四十丸酒吞下空心食前日三服丸子可以食前煮散可以食後相兼服為佳治因驚傷肝脇骨裏疼痛不已桂枝散枳殻一兩小者桂枝半兩右細末每服二錢薑棗湯調下治脇下疼痛不可忍兼治脚弱芎葛湯川芎乾葛桂枝細辛枳殻人參芍藥麻黄防風各半兩甘草一分右粗末每服五錢水二盞薑三片同煎至七分去滓温服日三服有汗避風沈存中良方載頃在建康毉者王琪言諸氣惟膀胱氣脇下痛最難治謂神保圓能治之熈寧中病項筋痛諸毉皆作風治之數月不差乃流入背膂久之又注右臂攣痛甚苦憶琪語有此一證乃合服之一服而差再發又一服差神保圓具本方治脇下風氣作塊寒疝發則連小腹痛凑心其積屬肝在右脇下故病發則右邊手足頭靣昏痛不思飲食止頭冷乾薑一兩麻黃三分側子一箇川芎防風枳實芍藥桂枝𦍑活甘草當歸各四兩右粗末每服四錢水一盞半薑三片同煎至七分去滓通口服日三四服有汗避風雜病雄黃治瘡􅅑尚矣周禮痬毉凡療􅅑以五毒攻之鄭康成注云合毉方合五毒之藥用黃蝥置不膽丹砂雄黃礬石磁石其中燒之三日三夜其烟上者以雞羽取之以注創惡肉破骨則盡出楊大年常等記其事族人楊嵎年少時有􅅑生於頰連齒輔車外腫若覆甌内潰出濃血不輙吐之痛楚難忍療之百方彌年不差人語之依鄭法製藥成注之瘡中少頃朽骨連兩牙潰出遂愈後更安寧信古方攻病之速也黃蝥即瓦合也崔元亮海上方治一切心痛無問新久以生地黃一味隨人所食多少搗取汁搜麵作餺飥或作冷淘良久當利出蟲長一尺許頭似壁宫後不復患劉禹錫傳信方貞元十年通事舍人崔抗女患心痛垂氣絶遂作地黃冷淘食之便吐一物可方一寸以來如蝦蟇狀無目足等微似有口蓋為此物所食自此頓愈麵中忌用鹽唐峽州王及即中充西路安撫使判官乘騾入駱谷及宿有痔疾因此大作其狀如胡𤓰貫於腸頭熱如溏灰火至驛僵仆主驛吏云此病某亦患來須灸即差用桞枝濃煎湯先洗瘡便以艾注灸其上連灸三五壯忽覺一道熱氣入腸中因大轉瀉先血後穢一時至痛楚瀉後遂失胡瓜豋騾而馳服桑枝法桑枝一小升細切炒香以水三大升煎取二升一日服盡無時圖經云桑枝平不冷不熱可以常服療體中風痒乾燥脚氣風氣四肢拘攣上氣眼暈肺氣𠻳消食利小便久服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑煎不服出抱樸子政和間予嘗病兩臂痛服諸藥不效依此作數劑臂痛甚愈治目方用黃連多矣而羊肝圓尤竒異用黃連末一兩白羊子肝一具去膜同於砂盆内研令極細衆手為圓如梧子大每服以温水下三十圓連作五劑但是諸眼目疾及障翳青目皆治忌猪肉冷水唐崔承元者因官治一死囚出活之囚後數年以病自致死一旦崔為内障所苦䘮明逾年後半夜嘆息獨坐忽聞階除悉窣之聲崔問為誰徐曰是昔蒙活者囚今故報恩至此遂以此方告之言訖而没崔依此合服不數月眼復明江左常有商人左膊上有瘡如人靣亦無他苦商人戲滴酒口中其靣亦赤色以物食之亦能食食多則覺􅈩内肉脹起或不食之則一臂痺有善毉者教其歴試諸藥不論草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此瘡可治也因以小葦筒毁其口以藥灌之數日成痂遂愈然不知何疾也唐鄭相公予為海南節度七十有五越地卑濕傷於内外衆疾俱作陽氣衰絶乳石補益之藥一日端不應元和七年有訶陵國舶主李摩訶獻此方經七八日而覺應驗自後常服其功神驗十年二月罷郡歸京録方傳之其方用破故紙十兩揀洗為末用胡桃肉去皮二十兩研如泥即入前末更以好蜜煉和勻如飴盛瓷器中旦日以温酒化藥一匙服之不飲酒温熟水化下彌久則延年益氣悦心明目補添筋骨但禁食芸薹羊血番人呼為補骨脂圓江陵府節度使進稀薟方元臣有弟訮年三十一中風床枕五年百毉不差有道人鍾針者因覩此患曰可餌稀薟圓必愈其藥久生沃壤五月間收洗去土摘其葉及枝頭九蒸九曬不必大燥但取蒸為度杵為末煉蜜丸如桐子大空心温酒或米飲下二十丸至三十丸所患忽加不必憂至四十丸必復如故五十丸當復丁壮奉宣府毉院詳録又知益州張詠進表云臣因換龍興觀掘得一碑内説修養氣術并藥方二件依方差人訪問採覔其草頗有異金稜紫線素根紫荄對節而生蜀號火炊莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自喫至百服眼目清明後至千服髭鬚烏黒筋力校健矣效驗多端臣本州有都押衙羅守一曽因中風墜馬失音不語臣與十服其病立痊又和尚智嚴年七十患偏風口眼喎斜時時吐涎臣與十服亦便差今合一百劑差職員史元素進唐桞桞州纂救三死方云元和十二年二月得脚氣夜半痞絶腹有塊大如石且死困塞不知人三日家人號哭滎陽鄭洵美傳杉木湯服半食頃大下三次氣通塊散用杉木節一大升桔葉一升無葉以皮代之大腹檳榔七箇合子碎之童子小便三大升共煮之一升半分二服若一服得決利停後服以前三死皆死矣㑹有教者皆得不死恐他人不幸有類予病故傳焉崔給事頃在澤潞與李抱真作判官李相方以毬杖按毬子其軍將以杖相格承勢不能止因傷李相拇指并爪甲劈裂遂索金瘡藥褁之強坐頻索酒飲至數杯已過量而靣色愈青忍痛不止有軍吏言取葱新折者便入溏灰火煨蒸熱剥皮劈開其間有涕取罨損處仍多煨取續續易熱者凡三易之靣色却赤斯須云已不痛凡十數度易用熱葱併涕褁纒遂畢席笑語驢尿治反胃外臺載昔㓜年曽患此疾毎食餅及􅅅粥等須臾吐出貞觀中許奉御兄弟及柴蔣等時稱多毉奉敕令治罄竭其術竟不能治漸至羸􅉵死在朝夕忽有一衛士云服驢小便極驗日服二合後食惟吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏知大内中五六人患反胃同服一時俱差此藥稍有毒服時不可過多盛取及熱服二合病深七日以來服之良驗葛洪云鬼疰者是五尸之一疰又挾諸鬼邪為害其病變動乃有三十六種至九十九種大約使人寒熱淋漓沉沉黙黙不的知所苦無處不惡累年積月漸就沉滯以至於死傳與傍人乃至滅門覺如是候者急治獺肝一具隂乾杵末水服方寸七日三未知再作肘後云此方神良宣和間天慶觀一法師行考訟極精嚴時一婦人投狀述患人為􅑂所附須臾召至附語云非我為禍别是一鬼亦因病人命衰為􅑂耳渠今已成形在患人肺中為蟲食其肺系故令吐血聲嘶師掠之云此蟲還有畏忌否久而無語再掠之良久云容某説惟畏獺爪屑為末以酒服之則去疾患家如其言得愈此乃予目所見也究其患亦相似獺爪者殆獺肝之類歟類證普濟本事方卷七
